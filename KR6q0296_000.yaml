front:
  text: 祖慶嘗欲焚前録俾學者自悟西來直指不滯文字語言今復鏤此板何也正欲枷上著杻縛上增繩令渠自透自脫靈剎漢一見便知落處更於此録求玄妙尋言句一任鑽龜打瓦淳熙戊申重陽日住鐘山小師祖慶謹書
