body:
  text: 參學比丘法宏道謙編洞山廣道者叢林號曰廣無心梓州人初游方問雲蓋智和尚興化打維那意旨如何智下禪床展兩手吐舌示之廣打一坐具智云此是風力所轉又將此語問石霜琳和尚琳云你意作麼生廣亦打一坐具琳云好一坐具只是你不知落處又問真淨淨云你意作麼生廣亦打一坐具淨云他打你亦打廣於此大悟真淨因作頌云丈夫當斷不自斷興化為人徹底漢已後從教眼自開棒了罰錢趂出院慈明琅瑘大愚等數人辭汾陽相讓不肯為參頭汾陽云此行不可以戒臈推聽吾一頌夭無頭吉州城畔展戈矛將軍疋馬林下過袁州城裏閙啾啾慈明出班云楚圓何人敢當此記莂遂領眾禮拜湛堂準和尚初參真淨淨問近離甚處準云大仰淨云夏在甚處準云大溈淨云甚處人事準云興元府淨展手云我手何似佛手準罔措淨云適來祗對一一靈明天真及乎道箇佛手便成窒礙且道病在甚處準云某甲不會淨云一切見成更教誰會洪州黃龍山父子傳器當代新山主道眼明白但其緣法與世不偶故衲子罕從之然鼎新一院皆合叢林典刑或問其故新云自有說禪者來院成詣南昌陳乞請積翠南禪師傳法住持郡可其請後數年新化去塔於山中南忽一夜夢見神人云乞去守塔寤亦不經意一日坐於方丈又見前夢中人云𮨇去守塔遂詰之神云自有交代人來未幾果塑像人至乃令別塑土地移舊者守新山主塔暹道者久參雪竇欲舉住金鵝暹聞之夜潛書二偈於方丈壁間即遁去偈曰不是無心繼祖燈道慚未廁嶺南能三更月下離嵓竇眷眷無言戀碧層又曰三十餘年四海間尋師擇友未嘗閑今朝得到無心地却被無心趂出山暹後出世開先承嗣德山遠和尚續通雪竇書山前婆子見專使欣然問曰暹首座出世為誰燒香專使曰德山遠和尚婆子詬罵曰雪竇抖擻屎腸說禪為你你得恁麼孤恩負德雲居舜老夫常譏天衣懷禪師說葛藤禪一日聞懷遷化於法座上合掌云且喜葛藤樁子倒了也秀圓通時在會中作維那每見訶罵不已乃謂同列曰我須與這老漢理會一上及夜參又如前訶罵秀出眾厲聲曰豈不見圓覺經中道舜遽曰久立大眾伏惟珍重便歸方丈秀曰這老漢通身是眼罵得懷和尚也湖南小景淳上座有才學曾著無縫塔銘大通本禪師用其語答無縫塔話云煙霞生背面星月遶簷楹淳居岳麓寺律身精進偶一夜經行殿陛失脚被攧傍僧掖起昏懵不辨人事至於平生所著文字亦不能曉兜率照禪師初遊方過岳麓聞老宿言淳事照驚曰我此生參禪不明心地亦如淳也偶一攧尚如此況隔陰耶蜀僧太瘤居眾時常嘆佛法混濫異見鋒起乃曰我參禪若得真正知見當不惜口業遂發誓禮馬祖塔長年不輟忽一日塔放白光感而有悟後遍至叢林勘驗老宿過雪竇山前云這老漢口裏水漉漉地雪竇聞其語後相見竇云你不肯老僧那太云這老漢果然口裏水漉漉地遂摵一坐具便行直歲不甘令人於中路歐打損太一足太後至都下放恣市有官人請歸家供養每令侍妾奉事太屢告辭官人確留之愈加禮敬太一日伺官人至故意挑其妾官人以此改禮因得辭不數日於閙市中端坐而化大陽平侍者預明安之室雖盡得其道唯以生滅為己任擠陷同列忌出其右者琅瑘廣照公安圓鑑居眾時汾陽令探明安宗旨在大陽因平密授明安常云興洞上宗乘非遠即覺二人云有平侍者在明安以手指𮌎云平此處不佳又提拇指丫义中示之云平向去當死於此洎明安示寂遺囑云瘞全身十年無難當為大陽打供入塔時門人恐平將不利於師遂作李和文都尉所施二黃白器物書於塔銘而實無之平後住大陽果要開塔焚之耆宿切諫平曰於我有妨遂發塔見明安顏貌如生遂焚之薪盡儼然眾皆驚異平以油盌薪俄成灰燼眾以事聞官坐平謀塔中物不孝還俗自稱王秀才謁琅瑘瑘云昔日平侍者今朝王秀才我在大陽時便見你做處遂不納又謁公安安亦然平流浪無所歸竟不免大陽丫叉之記悲哉峨眉山白長老常云雪竇有頌古百餘首其詞意不甚出人何乃浪得大名於世遂作頌千首以多為勝自編成集妄意他日名高雪竇到處求人賞音有大和山主遍見當代有道尊宿得法於法昌遇禪師不出世住大和稱山主氣吞諸方不妄許可白携頌謁之求一言之證欲取信後學大和一見唾云此頌如人患鵶臭當風立地其氣不可聞自此不敢出似人後黃魯直至其寺書于壁云峨眉山白老千頌自成集大和曾有言鵶臭當風立歸宗可宣禪師漢州人琅瑘廣照之嗣與郭功甫厚善南康守以事臨之宣令人持書與功甫且囑莫令縣君見功甫時任星子尉得書云某更有六年世緣未盡今日不奈抑逼何且托生君家六年望君見𮨇功甫得書既驚且喜中夜彷彿見宣入臥內不覺失聲云此不是和尚來處妻問其故功甫呼燈以宣書示之果有娠及生即名宣老纔周歲記問如昔逮三歲白雲端和尚過其家功甫令出相揖纔見便呼師姪端云與和尚相別幾年耶宣屈指云四年端云在甚處相別宣云白蓮莊上喫油糍端云以何為驗宣云爹爹媽媽明日請和尚齋忽門外推車過端云門外甚麼聲宣作推車勢端云過後如何宣云平地一條溝後六歲無疾而化海印信和尚桂府人嗣琅瑘住蘇州定慧時年八十餘平日受朱防禦宅供養屢到其家一日朱問云和尚後能來弟子家託生否信笑諾之歸院小不快數日而化其化日朱家生一女圓照本禪師聞其事往訪之方出月一見便笑圓照喚云海印你錯了也女子便哭當時化去和州開聖覺長老參長蘆夫和尚久無所得聞五祖法道徑造席下祖一日室中問釋迦彌勒猶是他奴且道他是阿誰覺云胡張三黑李四祖然其語時圓悟為座元祖舉似之悟云好則好只恐未實不可放過更於言下搜看次日入室祖如前問覺云昨日向和尚道了祖云道什麼覺云胡張三黑李四祖云不是不是覺云昨日為甚麼是今日又道不是祖云昨日是今日不是覺於言下大悟後出世開聖見長蘆法席大盛乃嗣夫不原所得拈香時忽覺𮌎前如擣遂於痛處發癰成竅常以乳香作餅塞之久而不愈竟卒長蘆福長老世緣頗稔而道眼不明常將所得施利舟載往上江齋僧圓通秀禪師聞之往驗其虗實適至遇上堂云入荒田不揀可殺顢頇信手拈來草猶較些子便下座秀大驚曰說禪如此誰道不會乃謂諸方生滅遂躬造方丈謁之具說前事請益提唱之語福依文解義秀曰若如此諸方不謾道你不會開先暹和尚為歸宗南禪師作禪牀銘曰明珠產蚌凉兔懷胎觀此繩牀道之媒南次為開先作銘曰著地便穩荊公一日訪蔣山元禪師談論次元曰相公口氣逼人想著述搜索勞役心氣何不坐禪體此大事公從之又一日謂元曰坐禪實不虧人數年欲作胡笳十八拍不成夜來坐間已就元大笑荊公一日問張文定公曰孔子去世百年生孟子亞聖後絕無人何也文定曰豈無人恐有過孔孟者荊公曰誰文定公曰江西馬大師坦然禪師汾陽無業禪師雪峰巖頭丹霞雲門荊公聞舉意不甚解乃問曰何謂也文定曰儒家淡薄収拾不住皆歸釋氏去荊公欣然嘆服後舉似張無盡無盡撫几歎賞曰達人至論也援筆記于案間任觀察內貴中賢士太上皇極眷之任傾心釋氏遍參知識每自嘆曰幸得為人而形體不全及不識所生父母想前世輕賤於人招此報應遂發願遇休沐還私第屏絕人事炷香禮佛刺血書華嚴經每一字三禮願來生識所生父母忽一日有客相訪任出少遲客怒曰人客及門何故不出任笑曰在家中寫一卷赦書客詰其故任以實對取經示之曰此閻老子面前喫鐵棒吞鐵丸底赦書客驚駭久之還家亦自寫一部宣州興教坦禪師溫州牛氏子世業打銀因磨洗銀瓶次忽有省遂出家受具遊方為琅瑘廣照之嗣懷禪師住興教坦為第一座及懷受別請欲舉坦繼住時刁景純守宛陵懷恐刁涉外議乃於觀音前祝曰若坦首座道眼明白堪續住持願示夢于刁學士刁夜夢牛在興教法堂上懷凌晨辭州刁舉所夢懷大笑刁問其故懷曰坦首座姓牛又屬牛也刁就座出帖請之坦受請陞座有雪竇化主省宗出問諸佛未出世人人鼻孔遼天出世後為甚麼杳無消息坦云鷄足峯前風悄然宗云未在更道坦云大雪滿長安宗云誰人知此意令我憶南泉拂袖歸眾更不禮拜坦云新興教今日失利便歸方丈令人請宗至云適來錯祗對一轉語人天眾前何不禮拜盖覆却宗云大丈夫膝下有黃金爭肯禮拜無眼長老坦云我別有語在宗乃理前話至未在更道處坦云我有三十棒寄打雪竇宗乃禮拜真淨禪師遊方所至辯論傾座眾目為飽參坐夏大溈夜聞僧誦雲門語云佛法如水中月是否門云清波無透路因有省到德山遇應達磨小參有六祖不及雲門之語出眾訶之遲明即行欲謁雲峯悅禪師至湘鄉聞悅化去乃上雲居時舜老夫預造壽塔淨曰這俗漢不宿出山徑造黃蘗見南禪師南嘗問學者曰鍾樓上念讚脚下種菜時如何眾下語契乃問勝首座云猛虎當路坐南大稱賞之遂退居積翠菴令勝補其處淨三到庵中機緣不契乃云我自悟處此老只是箇修行僧不會我說話遂下山至翠巖見順和尚順問近離甚處淨云黃蘗順云菴頭老和尚安樂否淨曰安樂順曰甚處人事淨曰關西順曰說話又不似關西人淨曰幼曾遊學順曰甚處為僧淨曰北塔廣和尚小師廣與秀同參雙泉郁順即哭曰頃訥祖印參此二大老不會渠說話及乎我參得些禪要見他已遷化了因此號順婆婆又問新黃蘗住得如何淨曰甚好順曰渠只下得一轉語好便住黃蘗禪也未夢見在淨因此豁然見得積翠用處遂作數頌因暫到先寄積翠南閱頌知之淨至南問甚處來淨曰翠巖南曰恰值老僧不在淨曰向甚處去南曰天台普請南嶽遊山淨云恁麼則學人亦得自在去也南云脚下鞋甚處得來淨云廬山七百錢唱得南云何曾得自在淨指鞋云何曾不自在南異之一日因侍者捲簾次南問捲起簾時如何者云照見天下侍者乃佛陁遜禪師南曰放下簾時如何者云水泄不通南曰不捲不放時如何者無語南舉似真淨淨曰和尚須替侍者入涅槃堂始得南厲聲曰關西人自來無頭惱淨乃指旁僧即雲居祐時為藏主云只這藏主也未夢見在南大笑湛堂準和尚因讀諸葛孔明出師表遂悟作文章有羅漢疏云阿羅漢者梵語也此云無生出三界二十五有塵勞超分段生死受如來付囑應供人天福利一切羣情檀越宜興供養又有水磨記云泐潭山即馬祖大寂禪師與昔禪者輩選佛大道場雖年代深遠而佛法未甞遠也但其間善知識所見不同幺有高下故有遠矣如僧問馬祖如何是佛祖云即心是佛觀其所以即知眾生本來成佛無有高下其高下在人不在法也而況末世有我說法者是故選佛求師不得不審也大宋元符戊寅有漢中沙門意中上人尋師訪道選佛參禪竿木隨身逢場作戲然其場也戲乎一時以其功也利益千古於是革其舊制郢人猶迷徇器投機變通在我豈以繩墨拘其大猷而為古人規矩之所限哉是謂有子不可教其可教者語言糟粕非心之至妙其至妙之心在我不在文字語言也縱有明師密授不如心之自得故曰得之於心應之於手皆靈然心法之妙用也故有以破麥也即為其磑欲變米也即為其碾欲求麵也即為其羅欲去其糠也即為其扇而規模法則總有關棙消息既通不撥自轉以其水也一波纔動前波後波波波應而無盡以其磑也一輪既舉大輪小輪輪輪運而無窮由是上下相應高低共作其妙用也出之自然故不假人力之所能為而奇絕可觀玄之又玄然後左旋右轉竪去橫來更相擊觸出大法音皆演苦空無常無我諸波羅蜜而聞者聞其心見者見其性以至齅甞知覺盡獲法喜禪悅之樂又何即以米麵諸所須物供香積厨而為二饍飽禪者輩往來選佛者歟圓悟禪師初在溈山一日真如和尚問曰如何悟云起滅不停如曰可知是博地凡夫老僧三十年在裏許履踐只得相似次見晦堂堂曰我住院十二年不會如今方會脚尖頭也踢出箇佛後住昭覺有長老問劉鐵磨到溈山并雪竇御街行頌未審此意如何悟曰老僧更參四十年也不到雪竇處長老歎曰昭覺尚如此道況餘人耶劉宜翁甞參佛印頗自負甚薄真淨一日從雲居來遊歸宗至法堂見真淨便問長老寫戲得幾年淨曰專候樂官來翁曰我不入你這保社淨曰爭奈即今在這場子裏翁擬議淨拍手曰蝦䗫禪只跳得一跳翁大服又坐次指其衲衣曰喚作甚麼淨曰禪衣翁曰如何是禪淨抖擻曰抖擻不下翁無語淨打云你伎倆如此要勘老僧錢易郎中訪真淨說話久欲登溷淨令行者引從西邊延壽堂裏去錢遽云既是東司為甚麼却向西去淨云多少人向東邊討南康諸山相會佛印後至真淨問云雲居來何遲印云為著草鞋從歸宗肚裏過所以遲淨云却被歸宗吞了印云爭奈吐不出真淨云吐不出屙即出真淨和尚有時遽喚侍者將老和尚真來侍者將南禪師真至展開淨以手加額云不是這老和尚豈能如此輙顰蹙半餉即戒収之每每如此潛菴源和尚每見南禪師真即淚下真淨罷參辭南禪師南戒曰你更須見英邵武淨稟旨見英入室相契英謂曰子真參得雲門禪南常歎曰英門戶廣大吾所不如其為積翠所重如此南示寂偶泐潭虗席南昌移文命英補處英蹶然曰黃龍之道捨我而誰受之不辭一日執事者紛諍不已英曰吾領眾不肅有媿先師奄然告寂李文和都尉請琅瑘覺和尚注信心銘琅瑘大寫一句下面小寫一句文和一見大稱服雪竇在廬山羅漢林禪師會中一日同林看開池林問開池不待月池成月自來如今池成為甚麼不見月竇以瓦片投池中林喜之一日上堂竇出問云法爾不爾如何指南林云只為法爾不爾竇云大眾記取和尚答話拂袖歸眾知事忿其不禮拜欲挫辱之遂請至庫司問其故竇云和尚道甚麼一僧云法爾不爾竇云你道得不是却問次一僧亦云法爾不爾竇云這漆桶拂袖便行因作師子峯詩而去舜老夫一日問秀圓通聞你見懷和尚是否秀云是舜云有何言句秀云有投機頌曰一二三四五六七萬仞峯前獨足立奪得驪龍頷下珠一言勘破維摩詰舜云不好別有甚麼言句秀云一日有長老來參懷舉拂子云會麼長老云不會懷云耳朵兩片皮牙齒一具骨舜歎云真善知識秀從此服膺舜老夫洞山寶禪師嗣五祖戒和尚廬州人生於娼室無姓為人廉謹甞在五祖主寺事戒病令行者往庫司取生薑煎藥寶叱之行者白戒戒令將錢回買寶方取薑付之後筠州洞山缺人郡守以書託戒舉所知者主之戒曰賣生薑漢住得遂令出世住洞山後移住歸宗一日扶杖出門見喝道者來問甚官吏云縣尉令避路寶立道左避之忽見馬跪不行寶曰畜生却識人尉再拜而去復遷雲居一夜山神肩輿遶寺行寶云擡你爺擡你娘擡上方丈去神復輿歸方丈寶初行脚甞宿旅邸一夕為娼女所窘遂讓榻與之睡寶坐禪明發娼女索宿錢寶與之出門自燒被褥而去娼女以實告其父母遂請歸致齋以謝謂其真佛子也嘗作達磨祖師贊大播叢林琅瑘覺和尚和之今載正法眼藏大愚芝和尚會中有僧日誦金剛經二百遍芝聞得令侍者請至問云聞汝日誦金剛經二百遍是否僧云是芝云汝曾究經意否僧云不曾芝云汝但日誦一遍參究佛意若一句下悟去如飲海水便知百川之味僧如教一口誦至應如是知如是見如是信解不生法相處驀然有省遂以白芝芝遽指禪床前狗子云狗子𠰒僧無語芝便打出潛菴源和尚退居豫章之章江寺妙喜曾參扣之一日室中舉前話至不生法相處芝云狗子汝作麼生會妙喜云狗子潛菴大稱賞之謂其不生法相大愚芝禪師方便善巧如珠走盤不留影迹今以實法與人豈不孤佛祖之心乎大申公執政時因休沐日預化疏請言法華齋翌旦至府第坐於堂上申公將出見之自念曰拜即是不拜即是言大呼曰呂老子你好勞攘快出來拜也好不拜也好申公拜而敬之齋畢問未來臧否言索筆大書亳州二字與之不言所以後罷相知亳州治疊文字次忽見二字在前始悟其為讖也真淨和尚退洞山游浙至滁州琅瑘起和尚處因眾請小參真淨貶剝諸方異見邪解無所忌憚下座見起和尚云堂頭在此賴是別無甚言語起云你也得也二人相𮨇大笑而去葉縣省和尚嚴冷枯淡衲子敬畏之浮山遠天衣懷在眾時特往參扣正值雪寒省訶罵駈遣以至將水就旦過潑之衣服皆濕其他僧皆怒而去唯遠懷併疊敷具整衣復坐於旦過中省至訶曰你更不去我打你遠近前云某甲二人數千里特來參和尚禪豈以一杓水潑便去若打殺也則不去省笑曰你兩箇要參禪却去掛搭續請遠充典座眾苦其枯淡省偶出莊遠竊鑰匙取油麵作五味粥粥熟省忽歸赴堂粥罷坐堂外令請典座遠至自首云實取常住油麵煑粥情願乞和尚責罰省令筭所直估衣鉢還訖打三十拄杖出院遠舍於市中託道友解免省不允又云若不容歸院只乞隨眾入室亦不允一日出街見遠在旅邸前立乃云此是院門房廊你在此住許多時曾還租錢否今計所欠追取遠無難色持鉢於市化錢還之省又一日出街見其持鉢歸謂眾曰遠真有心參禪令人呼其歸汾陽無德禪師一日謂眾曰夜來夢亡父母覓酒肉紙錢不免徇俗置以祀之事辦於庫堂設位如俗間禮酌酒行肉化紙錢訖令集知事頭首散其餘盤知事輩却之無德獨坐筵中飲啖自若醉飽而去眾僧數曰噇酒肉僧豈堪師法耶盡包腰而去唯慈明大愚泉大道六七人在焉無德翌日上堂云許多閑神野鬼只消一盤酒肉兩陌紙錢斷送去了也豈不見法華經云此眾無枝葉唯有諸真實便下座范文政公守鄱陽薦福缺人力致古塔主領住持事一日對食次有廣侍者宣州人立其旁古於盤中取甘蔗一片度與廣接得便去支牀脚古笑謂文政公曰此子已後須參得禪廣竟不出世壽八十四無疾而化真淨和尚遊方時與二僧偕行到谷隱薛大頭處薛問云三人同行必有一智如何是一智二僧皆無語真淨立下肩應聲便喝薛竪拳頭作相撲勢淨云不勞再勘薛拽拄杖趂出薛見石門慈照自慶藏主蜀人叢林知名徧參真如晦堂照覺諸大老由廬阜入都城見法雲圓通禪師與秀大師偕行到法雲秀得參堂有以慶藏主名達圓通圓通曰且令別處掛搭候此間單位空即令入堂慶在智海偶臥病秀欲往問所苦而山門無假乃潛出智海見慶慶以書白圓通言秀越規矩出入圓通得書夜參大罵曰此真小人彼以道義故拚出院來訊汝疾返以此訐豈正人端士所為慶聞之遂奄息叢林竟謂慶遭圓通一詬而卒撫州明水遜禪師在法雲侍者寮時道林林禪師掛搭方丈特為新到茶遜躬至寮請之適林不在遜有同行僧與林聯案僧曰汝去俟渠來我為汝請遜去僧忽忘之至齋退鳴鼓會茶林不至圓通問曰新到在否趣請之林至圓通令退坐榻立眾前責曰山門特為茶以表叢林禮數因何怠慢不時至林曰適聞鼓聲欲赴茶忽內逼遂去登溷趍赴不逮圓通曰我鼓不是巴豆纔擊動你便屎出遜白曰是某忘記請某當出院時同行僧出眾曰不干侍者與新到事是某不合承受為渠請偶失記某當代二人出院圓通高其風義併宥之大溈秀禪師在仰山偉和尚會中為首座山門請供養主二十人先一日以名赴堂司令預知之翌日乃方丈受曲折及會茶次輙失一人偉問誰曰隨州永泰上座秀曰未諭已前告假乞以他僧備員偉然之俄有告者曰泰實在首座匿之偉亟令尋果至送入寮畢遂鳴鍾集眾數秀曰汝為領袖帥表後昆處心不公何以勸勵學者秀舌大而乾窘無以對竟杖逐之叢林畏服諸方尊宿示滅火浴得舍利極多唯真淨和尚舍利大如菽五色晶瑩而又堅剛谷山祖禪師真淨高弟也多収斂之盛以瑠璃瓶隨身供養妙喜遊谷山甞試置於鐵砧舉鎚擊之砧鎚俱陷而舍利無損豈非平昔履踐明白見道超詣所致耶賢蓬頭江州人溈山真如會中角立者見地明白機鋒穎脫有超師之作但行業不謹一眾易之真如結菴於方丈後令賢獨處唯通小徑從方丈前過不許兄弟往還復二年舉首眾立僧秉拂說法有大過人處由是改觀住郢州興陽數載道大行示寂肉身不壞圓悟和尚在溈山目擊其事妙喜遊興陽尚及見其肉身筠州黃蘗泉禪師初習百法論講肆有聲更衣南詢見真淨和尚於洞山有悟道頌其略曰一鎚打透無盡藏一切珍寶吾皆有機鋒迅發莫有當其鋒者真淨甞歎曰惜乎先師不復見後上堂說法不起于座而示寂真淨之言益驗湛堂準和尚興元府人真淨之的嗣分寧雲巖虗席郡牧命黃龍死心禪師舉所知者以補其處死心曰準山主住得某不識他只見有趙州洗鉢頌甚好郡牧曰可得聞乎死心舉云之乎者也衲僧鼻孔大頭向下禪人若也不會問取東村王大姐郡牧奇之具禮敦請準亦不辭平生律身以約雖領徒弘法不異在眾時晨興後架只取小杓湯洗面復用濯足其他受用率皆類此纔放晚參方丈行者人力便如路人掃地煎茶皆躬為之有古人風度真後昆良範也法雲佛照杲禪師嘗退居景德鐵羅漢院殿有木羅漢數尊京師苦寒佛照取而燒之擁爐達旦次日淘灰中得舍利無數諸座主輩皆目之為外道佛照乃丹霞輩流非俗眼所能勘驗仰山偉禪師服勤講肆聲華藉甚迨五十歲方更衣入叢林徑造筠州黃蘗參南禪師抗志參問久而未有省發飲南洗脚水經行廊廡間見山中耆宿即禮拜垂淚曰念行偉年老救取行偉屏處一室設獨榻燕坐有客至即讓榻命就座炷香叉手立其傍無他語自爾無敢過門者南知之謂曰汝忒𣉜絕物不可如此偉曰行偉老矣道業未成何暇講人事如趙州和尚云我在南方二十年除齋粥二時是雜用心處行偉何人輙敢宴逸南不能奪其志而心益奇之延平陳了翁名瓘字瑩中自號華嚴居士立朝骨鯁指觸邪有古人風烈留神內典議論奪席獨參禪未大發明禪宗因緣多以意解酷愛南禪師語錄詮釋殆盡唯金剛與泥人揩背注解不行甞語人曰此心有出處但未有知之者諺云大智慧人面前有三赤暗果不誣也佛照杲禪師謝事法雲居景德寺鐵羅漢院一日因曬麥次聞百法座主相語曰禪和家多愛脫空佛照造前曰座主會講百法論是否座主曰不敢佛照曰昨日雨今日晴甚麼法中収座主無對佛照以手中𭺗子打云莫道禪和家脫空好座主恚曰和尚且道昨日雨今日晴甚麼法中收佛照云第四十二時分不相應法中收座主屈服妙喜住徑山上堂舉前因緣乃云昨日晴今日雨時分不相應三日後看取慈照聰禪師首山之嗣咸平中住襄州石門一日太守以私意笞辱之塈歸眾僧迎於道首座趍前問訊曰太守無辜屈辱和尚如此慈照以手指地曰平地起骨堆其地隨指湧一堆土太守聞之令人剗去復湧如初後竟不意於襄州有僧問深山巖崖中還有佛法也無照云有進云如何是深山巖崖中佛法照云奇怪石頭形似虎火燒松檜勢如龍無盡居士愛其語而石門錄獨不載二事皆妙喜親見無盡居士說廬山李商老因修造犯土舉家病腫求醫不効乃淨掃堂宇骨肉各令齋心焚香誦熾盛光呪以禳所忤未滿七日夜夢白衣老人騎牛在其家忽地陷旋旋沒去翌日大小皆無恙至誠所感神速如影響非佛力能如是乎顒華嚴圓照本禪師之嗣初因登溷喫攧打破水瓶有省作偈曰這一交這一交萬兩黃金也合消頭上笠腰下包清風明月杖頭挑富鄭公甞參問之見上堂左右𮨇視忽契悟以頌寄圓照曰一見顒師悟入深夤緣傳得老師心江山千里誰云遠目對靈光與妙音鄭公罷相居洛中思顒示誨請住招提聞顒入境躬出迓之臨登車司馬溫公適至問公相何往鄭公曰接招提顒禪師溫公曰某亦同去聯鑣出郭候於郵亭久之忽見數十擔過溫公問誰行李荷擔者應曰新招提和尚行李遂索馬先歸鄭公曰要見華嚴何故却歸溫公曰某已見他了竟先還妙喜甞見李儀中少卿言之舜老夫住廬山棲賢槐都官守南康因私忿民其衣淨因大覺璉禪師甞入舜室聞舜還俗得得遣人取歸淨因讓正寢以居之自處偏室仁宗數召璉入內問道竟不言舜事偶一日嘉王取旨出淨因飯僧見璉侍舜之傍甚恭歸奏仁宗召對便殿時富鄭公為宰相奏舜被刑不可登對只許朝見仁宗見之嘆曰道韻奇偉真山林達士乃於扇頭上書云賜曉舜依舊為僧仍賜紫衣銀鉢盂特旨再住棲賢舜去棲賢日以二莊力舁轎至羅漢寺前二力相謂曰既不是我院長老不能遠去弃轎於途中而歸暨舜再來先令人慰諭二莊力曰你當時做得是但安心不必疑懼舜入院上堂舉頌曰無端被譖抂遭迍半載有餘作俗人今日再歸三峽寺幾多歡喜幾多嗔無盡居士自左司出守南昌年飢乃開東湖以濟民民困役死無數時有寂禪師者吳越錢氏之裔住上藍無盡令選一得力行者収瘞遺骸滿千數即與度牒寂差行者文溫福州人操閩音作詩上無盡曰知府左司也大奇教我東門南門西門北門収死屍願左司早入中書生箇大男兒更證阿耨多羅三藐三菩提寂欲檟檚無盡知之令人傳語長老行者詩好休要打他舜老夫一日舉鹽官和尚喚侍者將犀牛扇子來侍者曰扇子破也鹽官曰扇子既破還我犀牛兒來侍者無對舜曰時當三伏正須扇子為侍者不了事雖然如是鹽官太絮何不大家割捨侍者當時若見鹽官道扇子既破還我犀牛兒來便向它道已颺在𡏖𡒁堆頭了也李康靖公徐州人微時甞為豪右門舘東道善地理愛其忠孝直亮以葬地遺之窆其父且謂曰若要身為三公即低其穴若欲世世榮顯可高數赤雖高葬公亦位至兩府初登第受文僖縣主簿所得俸資除供給家常外唯用教子讀書邯鄲公諱淑時方七歲真宗出幸楊內翰億備顧問邯鄲褁幞頭衣綠袍捧書一封立於橋左真宗望見令侍衛抱至讀其書猶疑假手令別作太清橋賦即於上前跪寫進呈上大喜楊內翰奏曰此國家祥瑞當為陛下賀送入舘三遷入翰林前後十六年仁宗惜其才甞謂侍臣曰李淑如一枝花恐不耐風霜若令作宰相是速其死也邯鄲英俊過人數等讀書五行俱下古今罕有其比名重一時當世鉅公薨背不得邯鄲銘其墓其子為不孝康靖後果入兩府今世世食祿於朝家聲不墜實康靖陰德所致耳翠巖真點𮌎常罵舜老夫說無事禪石霜永和尚令人傳語真云舜在洞山悟古鏡因緣如此豈是說無事禪你罵他自失却一隻眼舜聞之作頌曰雲居不會禪洗脚上床眠冬瓜直儱侗瓠子曲彎彎永和尚作頌曰石霜不會禪洗脚上床眠枕子撲落地打破常住塼舜一日上堂云黃昏後脫襪打睡晨朝起來旋繫行纏夜來風吹籬倒普請奴子劈篾縛起便下座五祖演和尚會中有僧名法閃入室次祖問不與萬法為侶者是甚麼人閃云法閃即不然祖以手指云住住法閃即不然作麼生閃於言下有省後至東林宣秘度和尚室中盡得平實之旨一日持一枝花遶禪床一匝背手插於香爐上曰和尚且道意作麼生宣秘累下語閃不諾經兩三月遂問閃曰你試說看閃曰法閃只將花插香爐上是和尚自疑有甚麼事圓悟和尚甞參北烏崖方禪師佛鑑和尚甞參東林宣秘度禪師皆得照覺平實之旨同到五祖室中平生所得一句用不著久之無契會之緣皆謂五祖強移換他出不遜語忿然而去祖曰你去遊浙著一頓熱病打時你方思量我在圓悟到金山忽染傷寒困極入重病閤遂以平日參得底禪試之無一句得力追繹五祖之語乃自誓曰我病稍間徑歸五祖去佛鑑在定慧亦患傷寒極危殆圓悟病既愈經由定慧拉之同歸淮西佛鑑尚固執且令先行圓悟亟歸祖山祖喜曰汝復來耶即日參堂便入侍者寮經半月偶陳提刑解印還蜀過山中問道因語話次祖曰提刑少年曾讀小艶詩否詩有兩句頗相近頻呼小玉元無事只要檀郎認得聲提刑應諾祖曰且子細圓悟適自外歸侍立次問曰聞和尚舉小艶詩提刑會麼祖曰他只認得聲圓悟曰只要檀郎認得聲他既認得聲為甚麼却不是祖曰如何是祖師西來意庭前栢樹子圓悟忽然有省遽出去忽見鷄飛上欄干鼓翅而鳴復自謂曰此亦不是聲遂袖香入室通所悟祖曰此佛祖大事非小根劣器所能造詣吾助爾喜遂引去遍謂山中耆宿曰我侍者參得禪也佛眼和尚在五祖時圓悟舉臨濟云第一句薦得堪與佛祖為師第二句薦得堪與人天為師第三句薦得自救不了佛眼一日忽謂圓悟曰我舉三句向你以手指曰此是第二句第三句已說了便去圓悟舉似五祖祖曰也好𠰚乃辭五祖參歸宗真淨和尚去後祖謂圓悟曰歸宗波瀾闊遠到彼未必相契未數月有書抵圓悟曰比到歸宗偶然漏網聞雲居清首座作晦堂真贊曰聞時富貴見後貧窮頗疑著他及相見果契合云云踰年復還祖山眾請秉拂却說心性禪祖曰遠却如此說禪也莫管他洪州奉新縣惠安院門臨道左衲子往還泐潭黃龍洞山黃蘗無不經由偶法席久虗太守移書寶峯真淨禪師命擇人主之頭首知事耆宿輩皆憚其行時有淵首座向北人孤硬自立參晦堂真淨實有契悟處泯泯與眾作息人無知者聞頭首知事推免不肯應命淵白真淨曰慧淵去得否真淨曰你去得遂復書舉淵淵得公文即辭去時湛堂為座元問淵曰公去如何住持淵曰某無福當與一切人結緣自肩栲栳打街供眾湛堂曰須是老兄始得遂作頌餞之曰師入新吳誘携群有且収驢脚先展佛手指點是非分張好醜秉殺活劒作獅子吼應群生機開布袋口撒向南北東西直教珠回玉走咸令昧己之流頓出無明窠臼阿呵呵見三下三三三如九祖祖相傳佛佛授手淵住慧安逐日打化遇暫到即請歸院中歇泊容某歸來修供養如此三十五年風雨不易鼎新剏建佛殿輪藏羅漢堂凡叢林所宜有者咸偏焉黃龍死心禪師訪之淵曰新長老汝常愛使沒意智一著子該抹人今夜且宿此待與公理會些細大法門新憚之謂侍者曰這漢是真箇會底不能與他牙擘齒得不若去休不宿而行淵終於慧安闍維後六根不壞者三獲舍利無數異香滿室累月不絕奉新兵火殘破無孑遺獨慧安諸殿嶷然猶存豈非願力成就神物護持使不壞耶今諸方袖手領現成受用者聞淵之風得不愧於心乎呂居仁初筮仕授楚州鹽城主簿有謝秀才為診脉曰主簿二十年後有急飢疾後果如其言再求之醫謝曰雖無害已醫不得仍不可服煖藥常帶餅餌酒巵自隨遷起居舍人一日登對次忽飢即奏曰臣有急飢疾容臣退屏處服藥上笑許之王荊公問真淨和尚曰諸經皆首標時處圓覺經獨不然何也真淨曰頓乘所演直示眾生日用日用現前不屬古今今山僧與相公同入大光明藏游戲三昧互為賓主非關時處又問一切眾生皆證圓覺而圭峯易證為具謂之譯者之訛其義是否真淨曰圓覺經若可易維摩經亦可易維摩豈不曰亦不滅受而取證不滅受蘊而取證與皆證之義亦何異哉蓋眾生現行無明即是如來根本大智圭峯之說非是荊公脫服佛鑑和尚自浙中歸祖山躊躇不肯掛搭圜悟曰我與你相別纔踰月比今相見時如何佛鑑曰我只疑你這些子遂參堂圓悟話間舉東寺和尚問仰山汝是甚處人山云廣南人寺云我聞廣南有鎮海明珠曾收得否山云收得寺云何不呈似老僧仰山义手近前云慧寂昨到溈山亦被索此珠直得無言可對無理可伸東寺云譬如蟭螟虫於蚊子眼睫上作窠向十字街頭大叫云土曠人稀相逢者少謂佛鑑曰既云收得逮索此珠時又言無言可對無理可伸是如何忽一日謂圓悟曰仰山見東寺因緣我有語也東寺當時只索一顆仰山當下傾一栲栳圓悟深肯之法雲杲和尚遍歷諸家門庭到圓通璣道者會中入室次舉趙州問投子大死底人却活時如何投子云不許夜行投明須到意作麼生杲云恩大難酬璣大稱賞之後數日舉立僧秉拂機思遲鈍滿堂大笑杲有慚色次日堂中特為大眾茶安茶具在首座寮案上偶茶瓢子落地跳數跳忽悟得答話機鋒迅捷無敢當者復至真淨處因看祖師偈云心同虗空界示等虗空法證得虗空時無是無非法豁然大悟後出世上堂小參次常謂人曰和尚紹聖三年十一月二十一日悟得方寸禪詔住法雲開堂日中使捧御香至要語錄進呈時洪覺範在會下令侍者請來編語錄云且看老和尚面覺範編次呈之讀畢謂曰若要了生死底禪須還和尚若是攢花簇錦四六文章閑言長語須是我洪兄始得法雲平生氣吞諸方孩撫時輩盖所得有大過人處乃敢爾也福嚴寘和尚東川人初遊方見真如禪師發明正見在溈山知客寮立僧因語言過失乞退作園頭以贖其罪真如曰汝薄福事園供眾乃所宜也終二載求替辭真如要參真淨五祖去真如曰遍歷諸方先聖遺範汝行勿遲直造洞山室中相契真淨舉領眾立僧久之又至四祖宣和尚會中時時到五祖相見即勘辯果有過人處五祖謂四祖曰寘首座叢林達士何不舉他首眾四祖如其言五祖亦上堂稱其知見作略有李修撰帥長沙四祖以書薦之未幾福嚴虗席平普融復薦之李曰當先應副四祖但尋書未見因對客坐次有鼠於架上拖下一軸書送在面前取視之乃四祖舉寘首座書李異之遂令出疏帖敦請泐潭深和尚河東人真淨之嗣有悟侍者偶在知客寮見掉下火柴頭忽然有省直上方丈通所悟深喝出自爾失心引繩於延壽東司中自縊夜後常在藏殿知客寮東司三處出沒或敲磬或移人鞋履或度淨水瓶一眾苦之湛堂和尚遊浙回充首座聞其事中夜故入延壽堂東司抽脫壁燈微明忽然撲滅方脫衣悟便提水瓶至湛堂曰未要且待我脫衣脫衣罷接水瓶去當時悟自縊間抽脫須臾又送籌子來洗淨了喚云接瓶去悟纔接乃捉住摸其手或似軟或似硬問曰汝是悟侍者麼汝便是當時在知客寮見掉下火柴頭有悟處底麼參禪學道只要知本命元辰下落處汝在藏殿裏移端首座鞋履豈不是你當時悟底又在知客寮移枕子豈不是當時悟得底汝每夜在這裏與人提瓶度水豈不是當時悟得底因甚不知落處只在這裏惱亂大眾我明日勸大眾為你看藏經裒錢設粥追悼汝汝當別求出離參禪學道弘揚佛法不得滯著於此言訖乃推一推如瓦礫塔子倒索然有聲由是絕跡湛堂臂冷如氷踰年月方平復盖非人附陰而至故冷氣侵人如此許知可毗陵人甞獲鄉薦省闈不利而歸舟次吳江平望夜夢白衣人謂之曰汝無陰德所以不第知可曰某家貧無資可以遺人白衣者曰何不學醫吾助汝智慧知可輙寤思踐其言果得盧扁之妙凡有病者無問貴賤診候與藥不受其直病者日填門無不愈者後舉又中鄉評赴春官艤舟平望夢前白衣人相見以詩贈之曰施醫功普陳樓間阻殿上呼臚喚六作五思之不悟其意後登第唱名本第六人因上名殿試罷不祿遂升第五乃在陳樓之間方省前詩讖也佛光無礙禪師自蘇州承安赴詔住大相國寺慧林禪院惠恭皇后甞於簾下見登對罷乘空而去故日以太官所進御饍供養復令取禪師所食之餘還宮又以地錦製法衣自綴禪牌賜之以表奉法之誠冬月賜紅錦帳子乃至服飾器皿皆宮中所賜法衣回施法雲佛照禪師佛照復寄洪州寶峯湛堂和尚書云地錦法衣與準師弟行先師之道湛堂示寂留鎮山門交割至今猶存照覺禪師自泐潭移虎溪乃赴王子淳觀文所請開堂後百廢具舉陞堂小參入室無虗日常言晦堂真淨同門諸老只參得先師禪不得先師道盖照覺只以平常無事不立知見解會為道更不求妙悟却將諸佛諸祖德山臨濟曹洞雲門真實頓悟見生法門為建立楞嚴經中所說山河大地皆是妙明心中所現物為鬲上語亦是建立以古人談玄說妙為禪誣罔先聖聾瞽後昆眼裏無筋皮下無血之流隨例顛倒恬不知覺真可憐憫圓覺經云末世眾生希望成道無令求悟唯益多聞增長我見又云末世眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎豈虗語耶真淨和尚小參云今時有一般漢執个平常心是道以為極則天是天地是地山是山水是水僧是僧俗是俗大盡三十日小盡二十九並是依草附木不知不覺一向迷將去忽然問它我手何以佛手便道是和尚手我脚何似驢脚便道是和尚脚人人有个生緣那个是上座生緣便道某是某州人是何言歟且莫錯會凡百施為只要平常一路子以為穩當定將去合將去更不敢別移一步怕墮坑落壍長時一似生盲底人行路一條拄杖子寸步拋不得緊把著憑將去晦堂和尚謂學者曰你去廬山無事甲裏坐地去今得道子孫氷消瓦解間有末流門如死灰諺云是真難滅是假易除信矣哉佛照杲禪師初住歸宗專精行道未甞少懈深夜修敬罷坐於僧堂地爐中忽見二僧入堂一人厖眉雪頂一人年少皆丰彩頎然杲心喜自謂曰我坐下有如此僧須臾二僧出堂杲襲其後見入佛殿中杲亦隨入燈影熒煌爐中尚有火杲炷香拜佛二僧復出亦襲其後至佛殿前偶失所在自念忘却香合在殿內回身取時見殿門扃鎖遂喚直殿行者守舜開門舜取鎻匙開門見爐中香煙未散香合在寶堦上自不喻其故妙喜親見佛照說時守舜在其傍猶指以為證大丞相呂公蒙正洛陽人微時生緒牢落大雪彌月遍于豪右少有周急者作詩其略曰十謁朱門九不開滿身風雪却歸來可想見也塗中邂逅一僧憐其窮窘延之歸寺給粮與衣遺鏹遣之纔經月又罄竭矣再謁僧僧曰此非久計可移家屬住寺中房廊食時隨眾給齋飯庶幾可以長久呂如其言既不為衣食所折困遂銳意讀書是年應舉獲鄉薦僧買馬雇僕備衣裝津遣入都下省闈中選殿試唱名為大魁初任西京通判與僧相見如平時挈家赴官終任入舘十年遂執政凡遇郊祀所有俸給並寄閣太宗一日問曰卿累經郊祀俸給不請何也對曰臣有私恩未報上詰之遂以實對上歎曰僧中有如此人令具名聞奏賜紫方袍加徽號以旌異之呂計所積俸數萬緡牒西京令僧請上件錢修營寺宇并供僧其寺元是鐵馬營太祖太宗二聖生處太祖朝已建寺其僧乃寺主也太宗別賜錢重建三門賜御書度僧呂公逐日晨興拜佛即祝曰不信三寶者願不生我家願子孫世世食祿於朝外護佛法猶子夷簡申國公每遇元日拜家廟罷即焚香發廣慧璉禪師書一封申公之子公著亦封申國元日發天衣懷禪師書右丞好問元日發圓照本禪師書右丞之子用中元日發佛照杲禪師書其家世忱信痛敬盖有自來矣故錄之以警後世云保寧勇禪師二上足處清處凝同參白雲端禪師凝在侍者寮最久端有鬲氣疾凝常煨蘆菔以備無時之須端作傅大士講金剛經因緣頌曰大士何曾解講經誌公方便且相成一揮案上都無用直得梁王𥅄眼睛舉謂凝曰𥅄底是甚麼此一句乃為凝說老婆禪也凝以為親聞故綴頌下凝後住舒州天柱山清住舒州太平有大機辯五祖演和尚敬畏之清甞謂凝曰吾弟禪乃是為老和尚煨蘆菔換得政和初間有熊秀才鄱陽人遊洪州西山過翠巖時長老諱思文嗣佛印元禪師亦鄱陽人遣二人力擡籃輿至淨相所經林壑陰翳偶見一僧㒵古神清厖眉雪頂編葉為衣坐於盤石如壁𦘕佛圖澄之狀熊自謂曰今時無這般僧甞聞亮座主隱于西山疑其猶在出輿踧踖而前問曰莫是亮座主否僧以手向東指熊與二力隨手看回頭失僧所在而小雨初歇熊自登石視坐處猶乾躊躇四𮨇太息曰夙緣不厚遇猶不遇也泐潭月禪師黃龍南禪師齊名叢林稱南有定力月有辯才常共飯而月卞急一舉而盡飲漱棄去不𮨇他人遲速南屢苦之上藍晉禪師月之甥也侍次親目之告南曰師伯欲少待但舉楞嚴一二義詰之必忘所食袞袞不已南試之果如晉言夾山齡石霜琳久依佛日才禪師罷參後同遊上江至黃檗見南禪師上堂小參琳不諭其旨遂求入室齡怒之爛歐一頓而去琳後大悟機鋒脫略凡說法頗類真淨而於真淨不相識住石霜以頌送僧見真淨後句云憧憧四海參禪者不到新豐也是癡生肇融叡乃羅什法師之高弟号四依菩薩甞問什釋維摩經至不可思議品皆閣筆盖此境界非心思口議遂不能措一詞如李長者論入華嚴法界詞分句解皎如日星泮然無疑若非親遇了緣安能如此保寧勇禪師四明人初更衣依雪竇明覺禪師問道雪竇訶為央祥座主勇不意堂儀纔滿即抽單望雪竇山禮拜誓曰我行脚參禪道價若不過雪竇定不歸鄉遂至長沙雲蓋參見楊歧會和尚與白雲端和尚為弟昆後出世住江寧府保寧道播叢林果如其言雲頂山敷禪師開堂日有樂營將出問云一口吸盡西江水即不問遂回𮨇堦前下馬臺云請和尚吞却下馬臺敷展兩手云細末將來樂營將於言下有省懷禪師甞謂秀圓通曰元青州慶福建并汝三人克證吾宗自餘皆是隨根受道須菩提解空第一生時家室盡空世尊纔陞座須菩提便出眾云希有世尊且道見箇甚麼道理便恁麼道天親菩薩作無量偈只贊希有二字圓悟禪師云一句是一箇鐵橛故六祖聞應無所住而生其心便悟去真淨和尚一日告南禪師曰端和尚頌臨濟三頓棒因緣與某見處一般南云汝如何會他底淨纔舉南喝云端會你不會五祖和尚初參圓照禪師會盡古今因緣唯不會僧問興化四方八面來時如何化云打中間底僧禮拜化云興化昨日赴箇村齋半路遇一陣卒風暴雨却去神廟裏避得過遂請益圓照照云此是臨濟下門風須是問佗家兒孫始得祖乃參浮山遠和尚請益此公案遠云我有箇譬喻你恰似三家村裏賣柴漢夯一條衝檐了却問人中書堂今日商量甚麼事祖云恁麼地時大段未在遠因謂祖曰汝來晚矣老僧年邁耳背汝可去參箇小長老乃白雲端和尚老僧雖不識佗見佗頌臨濟三頓棒因緣見得淨潔祖遂參白雲五祖和尚甞問白雲摩尼珠人不識如來藏裏親收得如何是珠白雲便喝祖大悟五祖和尚既入白雲之室白雲令山前作磨頭祖逐年磨下収糠麩錢典解出息雇人工開供外剩錢入常住每被人於方丈鬪諜是非云磨頭逐日磨下飲酒食肉及非所糠麩錢將使盡矣一院紛紜祖聞之故買肉沽酒懸於磨院以手揶揄與婦人語笑無所忌憚白雲一日喚至方丈問其故祖喏喏無他說白雲劈面掌云便去退却祖色不怍云俟結筭了請人交割乃作禮而去次日至方丈云某在磨下沽酒買肉之餘剩錢三百千入常住白雲大驚方知小人嫉忌時秀圓通作首座受四面請即請祖充第一座及秀遷住棲賢祖復繼住四面白雲甞問五祖僧問洞山如何是善知識眼山云紙撚無油意作麼生祖云無摸索處後出世住四面白雲以頌送之曰無摸索處病難除放下蛇頭捋虎鬚今日雙泉通一線好看月上長珊瑚五祖和尚云我這裏禪似个甚麼如人家會作賊有一兒既長成忽自思惟我爺在時我爺養家我爺老後我却如何養家也須學个事業始得遂白其爺爺云好得一夜引至一富家穿窬入其宅開物帛櫃謂兒曰你取性入櫃中取物兒纔入爺便閉却櫃門將鎖鎖了故於廳上敲打令人家驚覺乃先尋舊窬而出其人家起來點火照上下果是有賊然又去了賊兒在櫃中怪云我爺何故如此正悶悶中忽得一計乃作鼠囓聲其人家使婢點火開櫃櫃纔開賊兒遂聳身突出吹滅火推婢倒急走出其人家趕至中路賊兒忽見一井乃推一巨石投井中其人家却於井中覓賊賊兒乃直走歸家問爺何故鎖我在裏許爺云你且休說你怎生得出兒具說上事爺云你恁麼地儘做得也五祖一日謂圓悟曰你也儘好只是有些病痛悟曰不知有甚麼病祖曰禪忒多悟曰本為參禪因甚麼却嫌人說禪祖曰但只尋常說話多少好續有僧問因甚麼嫌人說禪祖曰惡情悰便是圜悟佛鑑佛眼同在五祖一日相謂曰老和尚只是乾嚗嚗地禪往往說心說性不得因請益佛身無為不墮諸數祖曰譬如清淨摩尼寶珠映於五色色是諸數摩尼珠是佛身圜悟謂二老曰他大段會說我輩說時費力他只一兩句便了分明是个老大虫五祖甞云若說心說性便是惡口又云猫有歃血之功虎有起屍之德所謂驅耕夫之牛奪飢人之食若不如是盡是弄泥團漢佛鑑和尚云祖師西來直指人心見性成佛如今諸方多是曲指人心說性成佛圜悟和尚未出蜀時已聞定慧信洞山文石霜琳禪師名出蜀聞琳已歸寂因逗留溈山真如會中六七載遂蹉跌竟不見三大老為終身之恨師初遊方見宣州明寂紹珵禪師珵徧見前輩如琅瑘雪竇天衣皆承事請法出世嗣興教坦和尚後遷太平州瑞竹退居西堂師從之請益雪竇拈古頌古珵令看因緣皆要自見自說不少假其言語師洞達先聖之微旨珵甞稱於眾曰杲必再來人也復遊郢州大陽見元首座洞山微和尚堅首座微在芙蓉會中首眾堅為侍者十餘年師周旋三公座下甚久而曹洞宗旨者盡得其趣授受之際皆臂香以表不妄付授師自謂曰禪有傳授豈佛祖自證自悟之法棄之依湛堂和尚一日湛堂問曰你今日鼻孔為什麼無半邊對曰寶峯門下湛堂曰杜撰禪和又一日於粧十王處問曰此官人姓甚麼對曰姓梁湛堂以手自摩頭曰爭柰姓梁底少个幞頭對曰幞頭雖無鼻孔相似湛堂曰杜撰禪和又看經次問曰看甚麼經對曰金剛經湛堂曰是法平等無有高下為甚麼雲居山高寶峯山低對曰是法平等無有高下湛堂曰你却做得座主使下湛堂一日謂師曰杲上座我這裏禪你一時理會得也教你說也說得教你做拈古頌古小參普說你也做得只是有一件事你還知麼對曰不知甚麼事湛堂曰你欠㘞地一解在你不得這一解我方丈與你說時便有禪纔出方丈便無了惺惺思量時便有禪纔睡著便無了若如此如何敵得生死對曰正是某甲疑處後因湛堂疾亟師問曰和尚若不起此疾教某甲依附誰可以了此大事湛堂曰有个勤𭺗子我亦不識他你若見之必能成就此事若見他了不得便修行去後世出來參禪師在寶峯時元首座極見喜因請告謁李商老約一月便歸後四十日方歸元一見遽云噁野了也無常迅速師不覺汗下師因讀洞山悟道頌疑有个渠又有个我成甚麼禪遂請益湛堂堂云你更舉看師再舉湛堂云你舉也未會便推出師因湛堂和尚示寂請洪覺範狀其行實又得兜率照禪師書為紹介特往荊南謁無盡居士求塔銘初見無盡立而問曰公只恁麼著草鞋遠來對曰某數千里行乞來見相公又問年多少對曰二十四又問水牯牛年多少對曰兩箇又問甚麼處學得這虗頭來對曰今日親見相公無盡笑曰念公遠來且坐喫茶纔坐又問遠來有何事師曰泐潭和尚示寂茶毗目睛牙齒數珠皆不壞得舍利無數山中耆宿皆欲得相公大手筆作塔銘激勵後學得得遠來冐黷鈞聽無盡曰某被罪在此不曾為人做文字今有一問問公若道得即做塔銘道不得即與伍貫錢褁足歸兜率參禪去師曰請相公問無盡曰聞得準老眼睛不壞是否師曰是無盡曰我不問這箇眼睛師曰相公問甚麼眼睛無盡曰金剛眼睛師云若是金剛眼睛在相公筆頭上無盡曰恁麼則老夫為他點出光明令他照天照地去也師曰先師多幸謝相公作塔銘無盡唯唯而笑圓悟問師達麼西來將何傳授師云不可㹅作野狐精見解又問據虎頭收虎尾第一句下明宗旨如何是第一句師云此是第二句圜悟問師亡僧遷化向甚麼處去師云開寶塔圜悟問師巖頭纔跨德山門便問是凡是聖德山便喝意作麼生師云殺人須是殺人刀活人須是活人劒僧請益圜悟僧問投子如何是十身調御投子下禪牀立又問凡聖相去幾何投子下禪牀立意旨如何圜悟曰切忌復請益師師曰恰好師謂趙巨濟曰老和尚忽退去後別有人來教你禪這一轉因緣怎生會那一轉又如何會便將熱屎潑但記取師在雲居作首座一日到西積莊遇一暫到從圓通來云因看首座頌女子出定話有箇悟處特來求首座印證師云你去你去不是僧云某甲未說見處為甚麼道不是師再三搖手云你去不是不是其僧懡㦬而退圓悟一日到首座寮因說密印長老在金山陞座乃云四年前見他恁麼地及至來金山陞座也只恁麼地打一箇回合了又打一箇回合只管無收殺如何為得人恰如載一車寶劒相似將一柄出了又將一柄出只要搬盡若是本分手段拈得一柄便殺人去那裏只管將出來弄時有僧聞得謂師曰某前日因看他小參語錄便知此人平昔做得細膩工夫所以對眾只要吐盡一段了又一段不肯休師云事不如此龍王得半盞水便能興雲吐霧降注大雨那裏只管去大海裏輥謂我有許多水也又如會相殺底人持一柄鎗纔見賊馬便知那个定是我底近前一鎗殺了賊跳上馬背便殺人去須是恁麼為人始得師因遺火燒簾次日告香舉狗子無佛性話乃云欲識佛性義當觀時節因緣雲門大師道若是得底人道火何曾燒著口因作頌曰趙州狗子無佛性道火何曾口被燒昨夜驀然簾上發南海波斯鼻孔焦師因舉趙州問僧近離甚處僧云雪峰州云雪峰有何言句僧云雪峰道盡大地是沙門一隻眼汝等諸人尋常向甚麼處痾趙州云汝更回去麼僧云即日便行州云我寄你个鍬子去師云如今諸方商量趙州寄鍬子與雪峯便道剗却那痾底當時若道寄个鉢盂去不知又如何商量師因舉肇法師云釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無說以顯道釋梵絕聽而雨花斯皆理為神御故口以之而默豈曰無辯辯所不能言也師云盖以理為神御故不是默然人多是去這裏死却不得活只得口掛壁上古人道依無住本立一切法雲門大師活得便會道扇子𨁝跳上三十三天𡎺著帝釋鼻孔東海鯉魚打一棒雨似盆傾英蓬頭曾下四轉語云釋迦掩室於摩竭是諸佛無說而說淨名杜口於毗耶是菩薩無說而說須菩提唱無說以顯道是聲聞無說而說釋梵絕聽而雨花是凡夫無說而說此四轉語在他分上則儘好若是為人則不得李道山剃頭請小參山僧亦曾有四轉語釋迦掩室於摩竭喪盡家財淨名杜口於毗耶守繫橛須菩提唱無說以顯道把髻投衙釋梵絕聽而雨花望空啟告師因舉舊見一老宿上堂云我在老師會中得个末後句不免布施大眾良久云不與萬法為侶者是什麼人待汝一口吸盡西江水即向汝道便下座師云山僧即不然我在老師會中得个末後句不免布施大眾便下座師因入室退謂眾曰今時兄弟知見情解多須要記閑言長語來這裏答大似手中握無價摩尼寶珠被人問你手中是甚麼却放下了拈起一个土塊相似可煞是癡若恁麼參到驢年也則未省師云如今一般宗師為人入室三五遍辨白學者不出却教他說見處便問你見處如何學者云我見處說不得却云你說不得我如何見得你去若恁麼地如何為得人不見泉大道到慈明處云片雲橫谷口遊人何處來泉云夜來何處火燒出古人墳明云未在更道泉作虎聲明便打一坐具泉推明向禪牀上明却作虎聲泉云我見八十四人善知識唯你繼得臨濟宗風看他恁麼問答數句那裏是見他處須是如此始得師云我這裏無法與人只是據欵結案恰似你將得箇琉璃瓶子來護惜似箇甚麼我一見便與你打破你又將得箇摩尼珠來我與你奪了你相次只恁麼來我又和你一雙手截了所以臨濟和尚道逢佛殺佛逢祖殺祖逢羅漢殺羅漢你道既稱善知識為什麼却要殺人且道是甚麼道理師云如今兄弟做工夫不省者過在於何只為要去明他只如道恁麼也不得不恁麼也不得恁麼不恁麼揔不得且作麼生明是你將一轉語去明他得麼永明他不得古人忒殺直截自是你不肯去直截處行可謂只為分明極翻令所得遲師云山僧待人至誠須是你資質是始得此是一超直入如來地參禪須是直心直行直言直語心言直故終始地位中間永無諸委曲相祖師西來只道直指人心僧問雲門如何是佛門云乾屎橛擬議思量早曲了也而況脫空乎師云學道人如被人偷却一顆明珠相似須是先捉得賊始得若捉得賊然後緩緩地考將來自然尋得出也師云你若會去過他方世界更他方世界又他方世師云我這裏空手只是用你底師云大凡參禪不必有機鋒便言是昔雲蓋智和尚道眼明白因太守入山憩談空亭問如何是談空亭智云只是个談空亭太守不喜遂問本慕𮨇本云只將庭說法何用口談空太守乃喜遷本住雲蓋若以本較智則大遠乃知真實事不可以機鋒取人寶峯元首座亦有道之士答話機鋒鈍覺範號為元五斗蓋開口取氣炊得五斗米熟方答得一轉語師云張無盡見兜率悅却譏晦堂有頌曰久響黃龍山裏龍到來只是住山翁須知背觸拳頭外別有靈犀一點通當時諸方莫不嘆服山僧後來見得惜乎無盡已死彼云須知觸背拳頭外別有靈犀一點通若將此頌要見晦堂不亦遠乎師云山僧在泐潭時未參得禪先會得汾陽十智同真愛他道面目現在遂作頌曰兔角龜毛眼裏㘽鐵山當面勢崔嵬東西南北無門入曠劫無明當下灰甞舉似洪覺範覺範歎曰作怪我二十年做工夫只道得到這裏李參政漢老蔡郎中子應儲大夫彥倫李教授端友一日同會雲門菴因師小參舉趙州栢樹子話有頌曰庭前栢樹子今日重新舉打破趙州關特地尋言語敢問諸人既是打破趙州關為什麼却尋言語良久云當初將謂茆長短燒了元來地不平李參政聞之豁然契悟謂師曰若無後語某亦不省李端友私謂蔡子應儲彥倫曰不是李漢老參得禪乃是李參政參得禪子應曰不然參政公不是三家村裏漢須是他自肯始得彥倫曰子應之言是也烏龍長老訪馮濟川話次川云昔有人問泗洲大聖何姓州云姓何又問住何國土州云住在何國此意如何龍云大聖本不姓何亦無國土乃隨緣化度耳川笑云大聖姓何住在何國如是往返數四遂致書於師乞為斷此公案師云有六十棒寄去三十棒打大聖當初不合道姓何三十棒打馮居士不合道大聖決定姓何若是烏龍長老教他自領出去師到明月堂見壁𦘕枯骨馮濟川頌云形骸在此斯人何在乃知一靈不屬皮袋師繼以頌云即此骸骨便是其人一靈皮袋皮袋一靈因無礙請師讚法海真乃曰上江老宿大段笑下江雲門下却不笑覺印盖他曾見保寧勇洎真淨輩兼秀圓通曾見舜老夫浮山遠所以較別其餘皆可笑也盖法海嗣覺印覺印嗣圓通也其詞曰廓圓通門續雲門派燕坐胡牀虎視百怪佩毗盧印摧伏魔外一句當陽電光匪快不動道場入三昧贊毀二俱遭白癩夫是之謂法海老人能於一毫端而遊戲無邊之法界
