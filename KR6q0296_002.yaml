body:
  text: 李參政跋漢老妙喜老人頃由訓徒凡舉揚次必引古今異事欲聞後學之未聞耳門人競書草軸且為記事或好事傳于方册悉非老人著述之文以故事無次序文不飾詞但一時據實直截明道而已叢林中不知其詳者往往以此品藻是非氷炭得失於戲今之學者管天蠡海一致於斯失其真而循其贋却其本而趍其末誠亦夥矣殊不知老人初無意於編集文墨乎豫不可默識謾書於草本之後辛酉上元日無住居士李邴書于小溪草堂之上張丞相德遠以大方便護持正法巍巍實相逈超生滅江河洶湧龍象蹴踏我觀師容作如是説正令既行天魔落膽在在處處法光照曜有子弗識謂師立我看取太虗雷聲電火沛為法雨均受其澤以是觀師自他莫隔法眼傳心俗眼傳形惟形與心二揔非真要識大慧青天白雲李丞相伯紀聞佛日之名而未識其面見佛日之相而未聞其言心契神交未識面可也目擊道存不聞言可也如水中月雖非實見已有清涼之意如獅子吼雖未發聲已生畏仰之心自非真是恁麼人辨恁麼事衆所推許疇能及此雖然孤峯頂上訶佛罵祖彼佛日也一幅丹青默然無説此佛日也孰是孰非明眼人必有辨之者咄李參政漢老師之事圜悟如管仲之相齊一則仲父二則仲父師之辨邪正如仲尼之尊周知我者春秋罪我者春秋觀其説法如雷如霆要處如約如契用處如日如月合處如父如子故一時英奇博達之士皆重其道德而從方外之遊四方鼻孔遼天分座説法之流亦服膺而稱弟子嗚呼所以起臨濟之正宗光明盛大於世者其有以也夫圓顱嶽聳秀眸電曄和氣春融孤標霜潔為法梁楹作世津筏人天瞻仰魔外震懾更有一句誰能辨別道是則瞎却汝眼道不是則蹇却汝舌普化莫翻筋斗趙州休言打殺阿難迦葉盡攢眉未了吾今為君訣李參政泰發往年曾見老維摩今朝忽著僧衣服因甚丹青邈不成只為從來無面目錢參政處和天地不清寧此老滅天下太平好時節海裏蹺足坐試問有何神通把住驀面便唾擬向金輪風輪水輪欲界色界無色界東勝身洲西牛貨洲南瞻部洲北俱盧洲繞天一十八遭尋這般列列挈挈怪怪奇奇底尊慈元來更無兩箇咄肚裏無一物眼前空做大座下千餘人從頭都罵過一期快尊懷惡名遂遠播料想晉唐傳裏必無如是之高僧景德傳燈録中豈有這般底達磨英靈衲子見之好與驀面便唾馮給事濟川要識徑山長老強項更無倫匹安却千五百衆常住元無顆粒若論説禪説道果是縱橫難敵一味性氣不常佛也理會不出隔江一見便回敢保上上大吉千五百人粥飯頭三百餘州善知識室中用箇竹篦只要拗曲作直若能當下全提便見佛祖消息信得及則立地成佛不費纖毫力箇是徑山和尚逆順千般萬樣喜時菩薩不如怒時修羅莫況信意七縱八橫一任時人背向虗空尚可貓邈這漢從來無狀徐侍郎稚山世尊梵相不可雕志公形容不可邈若要脫體渾相似不用丹青兼斫削此身儼若禪定處又似談空句非句謾將寫示世間人不如倒行出門去趙郡王表之未出頭時籠天蓋地才垂手處驚天動地家風不尋常談禪成差異識者望山贊揚疑者謂渠罵詈除非曾向此山頂上行方解吞聲與飲氣劉侍郎韶美平生凌跨佛祖罵得半文不直被人貓畫將來一句何曾道得道不得聽不聞只這些子函蓋乾坤所以四方學者雲集其門沒討頭處翻袴作裩我與此老素無冤結一回見面眼中釘橛不須到處露渠醜拙河清海晏秋天高誰家甕裏無明月吳提刑元昭英氣玉山橫慈容秋月滿道是徑山真謂似砂蒸飯道非徑山真麥中還有麵除非識心人是非都不管滯貨百千年秦時𨍏轢鑽重興臨濟正宗杓柄須還這漢從來海上橫行莫怪平生擔板我今隨喜贊揚要且一期方便更若回頭𮨇渠瞎却天下人眼劉侍郎季高瞿曇係四十九此傑孫世希有姿如天人仰如斗七十五年獅子吼接物利生慈父母寫之丹青傳不朽蔡郎中子應這箇老阿師平生無所證面目不足觀言談非可聽偏説大脫空又愛使心行攪擾天下叢林訶罵古今賢聖如何當代宗師却有許多疵病就中一處可憐生解道狗子無佛性咄張徽猷昭遠稟奔雷掣電之機負挾山超斗之氣逢人説妙談玄本分全無巴鼻或時吹沙走石元來是他遊戲若還不是具眼作家管取落他這般圈䙡氣宇軒昂天資列挈峭拔機鋒雷奔電掣格外鉗槌烹祖烹佛可憐正法眼藏向這瞎驢邊滅鄭學士尚明世道交喪惡魔王長堯日掃氛佛日破妄江湖亂離存備衰微師來求人説法應機人住我去人去我住鵷鸞何求鴟嚇腐鼠火種刀耕若將畢生水雲無滯山海任意祖摧六宗師辨正邪只論一是不問五家居今行古不存規矩起廢針肓只令一悟久參衲子來不可麾裹糧服膺何以使之少與激發皆活鱍鱍放之叢林莫爾敢遏宗工大賢其合也天不見怒疑見之釋然如休黃蘗如愈大顛方來未艾奕奕其傳道在論實不汝競口分塗揚鐭各視長久草偃風馳雷轟雨驟話行不待三十年後鄭參議禹功真箇臨濟兒孫透徹三玄三句拈出丹霞幞頭江北江南獨步德山歌禾山鼓雪峯毬巖頭舞平地骨堆做盡路布爭如四海一間人襟韻飄飄袖輕舉塞上將軍只識彪辟易方知有真虎人言此老喜談禪此事誰人敢授傳少室峯前無剩語二祖風流遍大千立雪齊腰茲事且置明月堂前又作麼生熏風𩖼𩖼今猶昔正好披襟撫舜絃陳通判次仲偉哉此老有逼人之風韻有如王之氣宇以正知見主張大法以大力量荷擔諸祖縱口説禪如雷如霆恣意罵人如風如雨分別邪正如正人端士之在廟堂臨機殺活如謀臣猛將之臨行伍杜撰長老嫉之如仇讎本色衲僧愛之如父母楊岐一宗歷五世而光明盛大者賴此老以為法道之主至其驢鞴方來鉗鎚後學道出常情衆人莫得而擬議者不過一條黑竹篦子仁禪仁禪切須薦取傅經幹忠厚堂堂徑山人中之傑舉世背毀我獨面折人謂汲黯不在朝列下筆縱橫雷驅風卷人謂東坡不在翰苑我知斯人人天之師威武不屈貧賤不移蒲團拄杖笑視軒羲朝賢祭文特進尚書右僕射同中書門下平章事兼樞密使榮國公湯思退嗚呼道基竺乾化流普通世歷七祖枝分五宗諸方作者角立爭雄逮晦而微必昌而隆大哉禪師佛佛我同行解相應人境俱融仲尼之日老子之龍照曜萬里乘雲馭風七十五年法施無窮震於華夷仰如衡嵩果滿緣周順世而終人天咨嗟山林改容惟師道鑒夙契宸聰載錫命書恩殊禮豐我近逢師警昏發蒙亦窺其藩未遊其宮師遽云亡今將安從拘縻朝紱致奠莫躬緘詞命友以紓我悰師今湛然常寂光中生無所著死亦非空而我何為拳拳于衷尚享降授特進樞密使都督江淮軍馬魏國公張浚嗚呼我之與師本自心契燕語從容相忘物外惟師之心忠孝是依憂國憂民不落他歧孰識真僧巧肆中毀投之嶺隅快己私意惟彼太虗纖塵何污惟彼真金烈火何渝晚歲際遇本自天理師不少留為之出涕尚享右朝請大夫直敷文閣知臨安軍府事賜紫金魚袋陳輝佛法寖季異見相攻不有傑然孰振其宗猗歟大慧道峻而通孔老梵釋內外混融雄辨俊儀如河決東褰裳從之靡求不供下動閭里上傾王公歷載五十莫嬰其鋒晚歸龍井談笑示終師豈有逝道俗所恫饋奠之薄聊寫我𮌎尚享徽猷閣直學士左朝請大夫致仕劉岑嗚呼大慧示現於世説法度人者七十五年道大孰擬直與古佛黃面瞿曇並軀而齊肩正法寂寥誰與扶持賴吾大慧振起而復傳道眼如斯人天歸向方當一心恃賴慈護如子念母如病得藥如徒得車如涉得船衆生如雲與師有緣聽法未厭云何忽焉雖聞示寂尚冀住世竟不少留而般涅槃如師之高生死去來夢幻泡影皆示教而設權天人之姿今復何在懷想謦咳猶了了於目前唯是老朽識師京都遇之擇木之堂別之吳山之嶺屈指于今幾五十年心眼相照無復世態為衆生痛徒想像於靈筵形雖已矣隨緣赴感當不離菩提座而遍於三千大千寓情斯文如何可言尚享敷文閣直學士左朝奉大夫提舉江州太平興國宮徐林正教初傳一花五葉結果既成枝分派列楊歧正宗圓悟是嗣師子窟中復生師子哮吼奮迅震動大千魔軍潛伏大用現前群目瞻仰曒日中天師竄衡陽我遷南土移書相問欣然心許歲在己卯始覿慈顏欲傳其心匪訓以言欻然示寂返真歸源雙林滅度三昧火起蔥嶺西歸獨存隻履四衆纏悲如失怗恃我之於師慕戀無已何以寓哀薦之明水尚享降授左朝散大夫敷文閣待制江淮都督府參贊唐文若嗚呼是本無法法法相承得無法法指空示人謂菩提印謂魔王軍神而明之萬物俱陳威音已前誰鑿戶牗迦葉一笑符契相授臨濟得師棄而不守鼇吞鯨擲意氣無前反睨其母慈孝熏然巍巍堂堂證大自在散落語言傾倒渤澥為汝説竟信受匪親禮樂征伐若笑而顰豈以障故而生怒嗔倒戈仗鉞悉歸于仁七十五年俯仰如是像教凋落龍天憔悴萬世一遇有大聖人堯思舜聰契此道真隆名懿號茲焉寵賁法既不滅師豈長逝我念疇昔與師無同西家之西東家之東云何訃來裹飯無及編曲鼓琴明月其室尚享左朝奉大夫提舉兩浙東路常平茶鹽公事喻樗大士達化理難兩全或得佛法而無世緣有據名山其徒如雲四衆雖仰道價蔑聞備是二者惟導師我不即物物咸從之豎拂拈槌訶佛罵祖聲如雷霆震于東土縱橫妙用我不敢知勢到佛力尤為魁奇紙衣立脫隱峯倒化視彼死生實同晝夜我瞻徑山浮圖巍巍稽首遺範後學攸歸尚享左朝散大夫充敷文閣待制知福州軍州提舉學事充福建路安撫使汪應辰嗚呼臨濟之道不絶如線剽竊裨販紛紛自衒道不終晦異人乃現卓絶之識縱橫之辨乘鋒投機間不容眴嬉笑怒罵種種方便如蟄而雷如暗而睍一聞正音不墮邪見七十年間更閲世變持此曒曒付之百鍊生死亦然夫豈流轉我獨何為食不能咽念昔從遊開我迷眩我方在朝移書責善今無復聞吾以自唁重趼百舍敬致茲奠尚享左承議郎充集英殿修撰知平江府提舉學事張孝祥惟師道大德備為人天師細入微塵妙周沙界無呼不在一以貫之言語贊揚其則彌遠雙林告變隻履云歸海斷慈梁人剜慧目性路誰闢佛燈永灺像法之替夫孰不悲孝祥辱登師門見謂可教一言之誨針痼起死仲夏委書曰將來臨日聽拏音乃以訃至惟日在天人有明晦我常與師起居飲食師存師亡彼見如此我辭薦羞亦以彼故尚享右朝議大夫直敷文閣新知鄂州兼管內安撫使方滋惟師妙辨無方英𣗖間出承湛堂之三喚文采既彰契圓悟之一言靈光洞耀德譽喧騰於四海禪徒奔走於諸方雖風波嘗不測之淵然松柏凜後凋之節言不可已存記載以不遺道常無名非贊歎之可及俯念衰慵之迹夙論道義之交記倒屣之云初辱持盂而惠𮨇過門頂謁荐登衡嶽之蘧蘆易地相忘屢枉程江之書札逮來歸於吳越曾何間於歲時獨無龐蘊之機緣可入終南之閫奧亦乃循誘鈍根之士昭垂法語之言中視欿然愛忘厚矣驚傳訃問越在客塗想靈塔之已成哭虗堂而無路宗門閎建覩隆棟之忽傾苦海橫流失慈航而安濟肅陳薄供聊寄私衷尚享右奉直大夫直祕閣易惟師昔以道法鳴於東南領袖萬僧聲名彌天雖釋其衣而心實儒貫穿百家氣雄萬夫以言忤世一跌幾年生死窮達如不動山雖困其身道則愈明四海導師斗南一人昔寓衡嶽時始見師一見如舊𮌎襟坦夷生平自念所遇孔艱深中厚外其徒實繁與師一語目明心開西來妙旨雖未究該而其大節荷師深知今則已矣誰其告之嗚呼子方病歸幾臥九泉僧悅忽來報師之遷拊枕失聲揮涕咨嗟知幾百歲復生師耶師固超然我心則勤此一瓣香非師莫陳洋洋湘江萬折必東我之懷師豈有窮哉尚享左朝奉大夫主管台州崇道觀黃鉞堂堂惟師道大如天徒知其高孰見其全出現於世聲震大千奔走四方釋縛解纏王公大人服膺拳拳晚契皇明恩旨屢宣寶墨昭回照耀林泉方期入對疏闢道源師乎不留遽順世緣苦海茫茫喪大法船正宗淡薄君子憂焉鉞識師晚尚獲周旋疇昔之別忽復纍年往見不能俗慮所牽書來自夏訃問忽傳驚怛失聲徒爾潛然師如寶月歷劫長圓東升西沉晝夜豈偏此清淨輪寧有變遷緘詞千里姑以告虔山川雖隔師常現前尚享右朝散郎試將作監李端民嗚呼臨濟大用楊岐正脈不有偉人孰探其堂堂禪師釋門標的落髮受具龍蛇混迹周遊四方如玉蘊石一見圓悟機緣相直狗子佛性會其有極全體現前心融形釋匪圈金剛匪蓬栗棘昔也黯暗青天白日昔也鈍滯電光霹𮦷囊篋細碎窠臼綿密光明普照洞然明白宗風既振大闡法席坐斷雙徑魔外辟易正令方行盡掃蝥彼何人斯乃俾遷斥投荒萬里黃茅絶域身雖可抑其道不忒挈包來歸了無一物大君有命育王振錫學徒奔湊亘于阡陌旋歸徑山坦塗再闢謂言住世永紹正嫡云胡不淑西歸履隻嗚呼哀哉耆舊凋零正音孤寂風穴之後石腸鐵脊一朝去此悲慟奚益慨念晚歲盡夷畛域莨莠之茂公亦匪斥縱心而行刊落餘癖浮謗川流往往疑惑醯雞夏蟲有言昔昔豈識大慧一味真實惟彼至人本無欣戚生非吾作死非吾息或是或非凡情孰識逆行順行天亦莫測若毀若贊彼自揀擇嗚呼哀哉惟我支離久仰名德中間相望雲海蕩潏豈意東越獲拜履舄敘述疇昔情同莫逆朅來行朝會面促膝出入四載俗纍縈迫夢想名山跬步間隔時因西風間奉書尺繼聞公病憂憂懌懌猶冀勿藥言笑之適翩然告逝閟此和璧龍象既往憂心如惄法乳其瘠慧峯其泐孰與揮斤以斫郢質側聞靈骨塔廟奕奕臨風愴恨垂天闒翼虔修清供以寓痛衋焚香遣價覼縷敘述用致神交傾寫𮌎臆明靈昭然鑒于願力應供善來以慰心惻嗚呼哀哉伏惟尚享右監門衛大將軍昌州防禦使提舉佑神觀趙不微嗚呼我未識師仰師之高每虞先顛畢世莫交乃既一見領略音旨猊座舂容心目兩契師亦印可容我入室呵呵大笑去礙膺物我實鄙鈍賴師發蒙睽異未幾拳拳于中此遭非辜自救不暇忽聞順寂莫造几下歲時睕晚人物眇然臨文哽塞老淚如川尚享右奉議郎知臨安府臨安縣主管學事勸農公事賜緋魚袋張巨卿右修職郎臨安縣主薄莫漳右修職郎臨安縣尉周友諒惟師警悟之識英特之資禪門棟幹後學宗師三昧六通萬轍千歧如摩尼珠隨物應之詞鋒頴利觸處投機破迷釋縛渙釋群疑酌而不竭用無盡時如東海洋莫能測之淺識邪見人各異師執文害意泥矩循規磨甎未悟卓錐何為法雨普施一洗空之中遭譴斥瘴嶺嶮巇一身間關萬里奔馳折而不撓恬然自怡定力嶽峙孰可沮之能仁舊隱綱領荐持爰膺宸命俯慰人思神龍助供草木生輝四方龍象靡然從之維摩示病退息隨宜一彈指頃隻履西歸邈焉逝矣我心則悲薄奠致誠庶幾鑒之尚享右修職郎權臨安府觀察判官羅公旦嗚呼哀哉師真無意於茲世耶抑佛祖之道當平沈而莫之繼耶何一病遽蛻人天欲挽而不可冀也師之春秋七十有五不可謂不壽而大法所係學者宗仰雖百年而猶未慰也自臨濟以來顯道設教者不知其幾而光明俊偉未有如師之比也方其首衆京師結菴洋嶼頭角未露於諸方霆震已驚於群耳蓋師之所得盡先聖之淵祕而材力雄健又有絶乎其類者矣觀其開闢道奧論議駿發浩乎如河海之莫際及夫戲弄翰墨一落千字并孔老以為言混三教而一致世皆稱師聰明之過人博聞而強記而不知此皆其細也握千聖之要機揭明鑑而洞視自凡學道之徒有過乎前者不待片辭之徙而淺深洪纖皆得其肝肺則師之服人有前輩之所未至故一時震動四方響應魁礨不羣之士悉雲赴而川會一登鄮嶺兩主徑山摳衣於座下者率二萬指名聲登徹於九重而王公以下莫不斂袵而欽事昔其未見於世也衆欲正其師位而其得罪遷徙也日夜望其復歸歸而既老矣贏糧影從者視所之而輒詣及其謝病退臥而衆環繞弗散者猶幸其一言之誨嗚呼孰知奄兮忽焉而不復見也法鼓晨裂流星夜墜剡尺紙以上奏即吉祥而飇逝我生不淑習業蒙翳疏導洗滌惟師之恃今師已矣野干亂鳴蛙嘈雜將何所而止戾也薄奠敬陳繼以雪涕非獨悼一己之曷從蓋將為天下學者畏也尚享左承直郎添差臨安府觀察判官王明發惟師道滿四海萬衲一師坐斷今古不留一絲昭然若揭日月而行而示人以不疑浩乎猶河漢之無極而人莫測其涯所以能續佛命脈而起臨濟於中微師今云亡天人疇依聞者見者亦孔之悲嗚呼住也無住去也何為師於中間湛然不移嗟豫小子器淺識卑與其進不以遐遺修敬覺靈亦既後時瀹茗以奠姑寫我思尚享清淨居士李琛惟師道大德備識明行潔赫赫若大霆震一世皎皎若碧潭瑩秋月視生死如去來括造化於筆舌真所謂臨濟之宗師佛乘之人傑也嗚呼豫與師衡陽之相逢屢奉於從容握手露情實同契開心𮌎昭然發蔀屋而覩光輝灑然執熱惱而濯清風歲在辛巳之春晚振錫凌空於陽羡豫適值於造朝偶參差於一面迄偵伺以言還遂欣然而獲見方將拔我於流俗之中慰我於生平之願夫何尺書遠寄九祖下被丹青儼然偈言疏示稠封而來足以見意遺墨未乾遽爾長逝感德惟勤豈不興涕謂師之亡神怪茫茫謂師之存白璧無痕或隱或顯其道彌尊掣金鎖而碎玄關收劍鋩而掩崑崙琛也辱在交舊輒致其勤備潔誠而盡意庶不忘於妙喜老人嗚呼哀哉伏惟尚享淨智居士黃文昌嗚呼我生遠方俗學所蔽區區見聞惟執文字役役世塗莫匪聲利不聞師名況復法味頗疑曩劫曾預佛記深禪妙句時感夢寐癸酉仲夏一病幾躓悚然驚悟回向真諦始知有師道滿天地其後三載實始相值初瞻相好生大欣慰無怒一機偶發妙契師笑謂我何從得是勉哉弗偷成就法器闔宗歸仰父子兄弟下及兒童奔走承事師適長沙執別蕭寺我既潛然師亦出涕云何導師未免情纍乃知緣會非止一世師居徑山我亦三至今春之來乃獲給侍師不少留泊然而逝純陀後供我則無愧結集法藏久出師意敢有不敬以負大施師之道德本不容議或贊或毀空中飛蚋去來生滅非一非二我獨何為感歎歔欷邪見崢嶸正宗凋弊臨濟法道寂寥誰寄唯是之憂日墮清淚尚享無住居士袁祖嚴嗚呼天地雖大有形斯彰日月雖明有數可量惟我大慧孰為乎方若其有陳為謗之端往歲瞻禮寓于四安親授法語盡平生歡豈期遺誨遽成永訣波旬外道罔不欣悅從渠喧囂如湯沃雪孰知我師不用言説本自無生今則何滅四方有知涕淚哽噎引脰長號饋奠以別尚享右修職郎新洪州司法參軍王中復嗚呼極天下之明不足以窺師之道妙盡天下之口不足以言師之盛德其所以粗見於世者至仁之功如慈蔭妙雲混元氣而覆三界無礙之辨如天潢之水決萬仞而經九域賢愚由是以知歸狐狸於焉而屏息方其身蹈世綱竄流夷貊不陋而居至者猶識彼魔方熾孰戰而克萬里生還稿項黃䤋帝衷簡在天章屢錫寵以嘉號庥光赫奕歸老林泉為世所式胡不百年以休南國嗚呼生死去來雖如昨夢在師處之固已無憾其所可惜者季世末學將無所憑依使野干夜號正道滅熄埴索塗不見斗極嗚呼哀哉中復二十餘年辱知甚厚不鄙其愚推挽是力三年薄領調官北來登山頂謁晝談至夕約我西歸從容數日豈期三月遽返而寂悵音容之莫追歎山川之改色陳薄奠以薦誠寫忱辭之萬一尚享左文林郎常州軍事判官趙文吝惟師道尊一代提法之宗邪歸正佛者知從教闡宇內罔不師崇名起如日破驚愚蒙實大聲閎達天之聰大慧錫號允諧僉同百世之下聞者嚮風文吝久奉周旋辱不鄙庸知愛特至洞察心胸師去莫留我念無窮言雖在耳曷瞻其容宦縛于遠修祭阻躬覺靈不泯領此素衷尚享左文林郎充江淮都督府淮備差遣蔡頔嗚呼道有正傳法無輕付不落言詮悉由心悟死為可樂生也有涯作如是觀所見則差惟大慧師絶離倫類晝夜晦明混融一致去來自我戒定俱捐閩廣湖江身百億千念昔先人參同默契時出禪機與師遊戲我之識師實自孩童首辱受記將謂擊蒙乃者謁師于鄞之水撞鍾迎門萬二千指昨秋邂逅西湖之山豈意此別終焉莫還方外所期曷悲永訣有志于茲疑將誰決紛紛邪解亦謂宗師臨濟餘風繇茲懼衰不有克家孰能振起諸見掃除請從今始師雖往矣師則長存敢不歸依以實斯言尚享右通直郎充江淮都督府幹辦公事羅博文嗚呼楊歧之旨四葉而得圜悟已大其門而起其宗矣五葉得師而其法益光明盛大惟師具爍迦羅眼用劍鋒上事踏翻小艷之章透出薰風之句縱橫妙用卷舒自由如臨濟德山大機大用訶佛罵祖坐斷諸方於一竹篦頭鍛煉百千衲子隨其根器各得受用諸多上足皆叢林之楩柟法筵之龍象門庭之盛儼然如馬祖雪峯之當年也博文早服高風願扣茲事才通消息許以針芥且言已發決定之志他日聚頭必無疑也師由回鴈復遷程江間關歲月始得南歸負笈謁師由杭走明乃獲相見於鄮峯之下以踐前言一聞法語即契初心然後知先覺之不吾欺則師於我實有解黏釋縛抽釘楔之力也唯當拗折竹篦如燒禪板庶可少報不為我説破之恩耳得師遺墨豈勝愴然屬以王事遠適贑川哭師龍山阻造塔前逮乎歲晚始返淮堧謹遣伊蒲之供遙瞻雙徑之巔嗟法幢之忽仆念祖道之難傳得法眼者可不著鞭惟靈光之不昧鑒誠欵之勤拳尚享右通直郎知潭州安化縣事賜緋魚袋向浣嗚呼我生雖後尚及老成惟師妙喜百世一人人天所宗如龍鳳麟方袍圓衲此特其形通萬物於一理孰知其真浣自幼歲已聞師名見師宜春如覩景星師曰可教朝夕是親以訓以誘以規之針凡二十年幾登師門荷師不忘久而益勤𮨇其鈍根頑冥弗靈不足以承師之誨而徒存此心今師往矣山摧川湮此道此法誰與主盟浣也無似身方埃塵聞師順寂失箸悲驚嗟太山之安仰歎此志之不伸嗚呼窮通離合去來死生師之視此如夕與晨浣復何言區區此情彈指東望為師具陳情不自已師無我嗔嗚呼哀哉伏惟尚享右奉議郎監行在左藏南庫路惟師天之秀靈道之軌範以達磨法髓起臨濟宗風直截示人纖塵不立一有得者望而知之自古以來至今未見方羣生之咸賴何法梁之遽摧所謂師之存也於其可見之時當見其不可見者所謂師之亡也於其不可見之時當見其必可見者乃知師非存亡之所能繫也某夙承師訓蒙獎提為最今也咫尺鞅掌是拘為此道以興悲奉深心以為報伏惟尚享右迪功郎監潭州南嶽廟張伯厚制行卓絶處己剛方其心金石其操氷霜早悟法眼聲名四揚空門領袖學者梯航曩自臨安與先子遊匪勢利交實臭味投道同德合情意綢繆一罹讒網同膺禍尤安之若命曾不為憂雖在貶所書問相周逮其俱還契好愈休先子早世師為痛苦既致奠禮又臨柩所恤亡念存德莫比數恩懷于衷圖報自許師今云亡一毫莫補凶訃遠聞悲極肺腑師之無恙遠近是依師既逝矣人誰適歸彼蒼者天胡不憗遺菲禮致勤師其或知尚享左朝散郎直祕閣潼川府路提點刑獄公事賜紫金魚袋何麒咄大慧師肉骨身無盡老佛雲門僧作小闍梨已英靈圓顱出世諸方驚振海潮音為發嗔自謂佛日開群盲倒推臨濟拖雲門踢翻晦堂喝東林我為童子居蠻荊立老佛傍識其人劫火熾然無不壞師見我文張口駭向道元來無盡在此語示人當再拜龍象奔騰越天海末法禪和多蝦蟹謂師不滅固揑怪喚作師亡亦癡騃二乘住世名應真捨死趍生為大乘太虗不沒師長存慧日杲杲元光明右承務郎守太府寺丞王之奇嗚呼之奇癸未窮臘有峴首之役道經玉泉見住持僧云道顏西遡且報佛日禪師下世慨然悲愴移日之奇初識師梅陽同憂患四年久久相敬愛不衰然窮冬盛夏圍爐納涼談古今論人物無一日不相從及乎分首猶眷眷不忘後雖再會徑山及輦下亦猶前日但各以事牽不如曩日之欵也惟禪師津梁法海為禪之宗盟雖三尺童子皆能言之然之奇迃疏未嘗及此不敢妄議惟公英明剛果出於天資少日從諸大老遊能道前言往行亹亹可聽故下視後進學士大夫又賦性狷急故不相知者以不遜加之嗟乎盛名之下難居況以方內之事責方外之人乎公名既熏天亦有疑似之謗但之奇四年之中欵接既久觀公細行所謂瞿曇氏之戒者則無毫髮遺恨公今往矣姑以平昔相與之義及世人所未知者筆於紙而奠之不復為世俗禮香茶蜜炬亦徐孺子生芻之義也尚享儔與佛日大慧普覺禪師遊逾三紀矣忽聞圓寂不勝悲愴天下獨步宗師云亡孰不歎惜自惟衰耄屏迹海瀕莫遑躬致茶果之奠聊賦詩一首以寫我心云爾一真居士莫儔竹篦常握振宗風妙喜橫行四海中喬嶽下覽衆山小真龍盡洗凡馬空名標普覺白日並塔躍寶光祥靄籠居士幽棲身懶動遙瞻明月恨何窮雙槐居士鄭績隆興改元十月九日致薄祭于大慧普覺禪師塔前遂作五偈以道追慕之情嶺外歸來又八年舌頭無骨口瀾翻有時穿透九流去湧出楊岐頂𩕳禪句裏呈機也大奇箇中消息不思議只緣心地明如日識得飛龍或躍時明月堂前月色新青山過雨絶纖塵松風凄斷碧雲合不見堂中舊主人殿角生涼得力句縱説橫説河沙數如今木倒藤亦枯且道句歸何處去八月十日五更鐘吹毛用了匣藏鋒想當殺活自由處不羡沙場定遠功釋音蝥莫交切徒得切顱音盧癭於井切嚇呼嫁切鏕音鹿睍奴見切灺徐也切欿胡感切剽匹妙切唶將吉切惄奴歷切渝音余衋覼力和切莨魯當切草名也莠音酉似禾非禾潏余律切鄮莫候切礨力水切蛙偷他侯切潛所姦切熄音息忱氏林切楩步連切柟汝鹽切笈睕於阮分憗魚覲切讚方外道友紫巖居士畫像讚并序士君子學先王之道必由孝敬忠信而入雖曰未至亦足以聳動時聽誇示後來豫欲其尤揚於世以厚風俗捨紫巖而誰初識公於京師時為奉常簿公務之暇來從圜悟老人遊神澄而量洪志堅而氣正目不妄視心無他緣非聖人之言不發於口明靜淵默淡然如止水之不搖未嘗謔浪笑傲蓋天資也後十五年再會於吳之四安時公身已貴名已大功業以成而明靜淵默與昔無異焉又三年豫得譴來衡陽公亦退身奉母太夫人居長沙新第名其堂曰盡心蓋盡其心以事親而食息不忘於君顯忠孝一而不偏也孟子曰盡其心者知其性也知其性則知天矣存其心養其性所以事天也豫曰性者天性也養性以事天則不忘本也公之盡心苟異是説非豫所知也衡陽廖侯繪公像來求豫讚豫與公有方外之契義不可辭謹敘其略為作讚曰偉哉紫巖昭代蓍龜垂紳天朝張羽儀功成歸休韜藏光輝自專一壑甘旨庭闈盡人子之心以事其親而造次必備盡臣子之心以報吾君而顛沛罔欺夫是之謂孝敬忠信之道進退躬行而不息深入淨名之不二者也侍郎胡公明仲畫像讚剛健純粹風度凝遠弟昆王謝而不逸也窮理盡性得聖人之精微心了其妙也藏光匿德而不忘吾君效葵傾於曜靈也見義便為若迅雷之破巨石仁者之勇也攘斥瞿曇紱除老氏疏通闕里之正脈也吞濤江藏五湖內太虗其量綽然而有餘也即此而見之歟捨此而見之歟具眼者其鑒諸遊運幹蕭卿畫像讚嚲袖拖笻行而匪步如春在花粹然如煦筆端風生揮掃塵霧是蕭卿耶孰好非蕭卿耶孰惡是非好惡俱不足以私是公唯疲瘵之氓喜而暴貪之吏懼斯可以為大君子之據安撫劉公方明畫像讚長沙開福宜禪師知妙喜與寶文公有一日之雅遣僧惟覺持此像來衡陽求讚不得而辭為之讚曰氣吐虹霓粹然平易袖活國已驗之方抱廊庿大成之器筆端語言𮌎次忠義致吾君於四三王而六五帝是皆韓吏部數百年遺風餘烈覩斯人而知斯文之不墜直閣向公宣卿畫像讚并序公之學聖人也非誦其言而求其名稱者也臨大節而不可奪而已公之為政也非苛察而姦蠧為之膽落者非使之然者也謂職分當然而身正而已公之介廉非著意以矯世而效伯夷之清者也於道不苟而已公之明白也非循私而取與若日月之晝夜者也善善惡惡而已公之為文也非鈎章棘句而務華忘實者也落筆遣辭而盡意之所欲言而已公之施設也非能捧土而塞飛湍之瀑流者也行其義之可行止其義之可止而已然為學為政介廉明白文章施設皆可得而形容若其精義入神窮神知化居一室而發樞機於千里之外善應而動天地者不可得而形容也豫以是故作公之讚而重其詞曰頎然向公岌岌堂堂烈如夏日嚴如秋霜至剛而柔至柔而剛孰謂却物能圓能方以是而見有而非有郢匠揮𮢲徒誇好手明鏡當軒孰逃妍醜賢德賢業可大可久又野服像讚并序豫罪居衡陽閲三載聞公守衡蒞政洎平昔出處大略於衡民遇節必立應機必斷推經旨以行己本仁義以及物事無大小剖判是非罔有顛倒公以為是則盡寰宇之口以非之而終不能非公之是公以為非則盡寰宇之口以是之而不能是公之非故能活己卯歲之飢民數萬於垂死至今衡民以吾父稱之則知公行己及物居是非之間無遺恨矣衡民繪公像建生祠於青草野寺以奉香火豫因覩其像而作讚以慰衡民戀德之心而丹青匪妙略無倣佛公之猶子深之出此本相示少分似之豫亟呼畫工摸而易之以冠裳書前讚於其上以歸深之抑留此本為林下道伴復作讚曰野服幅巾而藏用於山林兮訥如也分虎符為真明洪道衡陽之守兮鑑如也受命於急難之間而袒肩荷負兮嶽如也正法奉公以禦吏而柔明兮水如也坐霜臺掃險健之訟而空囹圄於太湖之陽兮電如也前讚未盡公之德兮今讚亦聊復爾耳知公者誰雲門村叟而已峴山居士徐顯謨畫像讚我欲讚此公此公不受讚又欲痛罵之亦復無可罵讚之與罵之一筆且勾下或曰如水之清潔高廉聰識通朗與夫徐孺子郭林宗之流又何以異哉妙喜聞之而笑謂之曰是亦跌蕩放言高談無畔岸傲世之匹夫何足擬公而嘆訝耶其可貴者目送歸鴻氣橫雲漢自言不斷淫怒癡而亦不與之俱只這如意摩尼畢竟無人酬價且道這一絡索是讚耶是罵耶苟或於此狐疑一任妍窮周易遍推六十四卦同前釋迦演化西竺乾助揚金粟何巍然達磨來茲東震旦亦有龐老扶其顛翻思命世寧乏賢峴山居士超塵緣一言定當諸佛祖與二大士相摩肩彼也此也有殊異證也徹也無後先太虗不受𮨇陸筆火聚那容蚊蚋延丹青一幅心手妙卓犖氣宇凌雲煙未是此公真面目更觀皎月凝秋天張徽猷昭遠畫像讚悟徹諸法無我果於諸法自在談笑出入生死敢與諸塵作對世出世間大丈夫一擊鐵圍百雜碎覺明居士夏運使畫像讚覺明明妙處不留元字腳佛祖出頭來一時都掃却沒人情有禮樂鐵脊梁硬嚗嚗堪任荷擔這一著妙喜恁麼差排大似助桀為虐向侍郎畫像讚佛道魔道兩俱掃世出世間亦虗間箇是塵中了事漢涅槃生死不相干劉通判彥沖畫像讚財色功名一刀兩段立地成佛須是這漢郭縣丞畫像讚神情淡然風骨粹然袖手儼然如春在花如意在絃如水在川文章事業遇物發宣普而不偏夫是之謂二十四考中書令之遠孫雖我不負丞而無丞負豫之歎者也徐和仲畫像讚神清而和氣徑而訐文武雙資大巧若拙奉公勤廉賦性介潔於朋友信而誠可以託生死然頭戴棊盤好為面折似虗舟而觸物若霜風而掃熱是讚耶是毀耶妙喜覩徐和仲之畫像掇筆代渠作如是説徐明叔畫像讚椹口秀目無依無欲落筆遣詞神驚鬼哭心造玄微如石藏玉徑氣橫秋不可攬觸還見麼夫是之謂徐明叔同前雞籠山下滴瀝水邊燕窠城裏生得箇徐明叔不學瞿曇不學老聃不學孔丘而瞿曇老聃孔丘所有底悉自具足野服幅巾撑七尺之霜笻與張晚李細錢嫩半醒半醉似利刀斫貓兒頭竹奇哉妙哉汪哉洋哉何莫由斯哉而乎文郁郁若道渠儂自有官業能書解篆吾説是人生身陷入阿鼻地獄李總幹畫像讚氣徑而和於物無忤內方外圓清簡儉素與朋友交也誠而謙奉公無私也勤而廉天不祐善若人云亡士林凋喪孰不感傷吾是覩斯像而作此讚乃公之實録也可與日月而爭光路撿法畫像讚不斷煩惱入涅槃不離俗諦談真諦精金百煉出爐冶豈畏重將烈火試人言此乃如一公我道渠非渠即是等間步武清風生掃盡士林寒乞氣本間居士畫像讚天邊月白本來白林下風清元自清幾人到此昏昏醉只有渠儂獨自醒㘞且莫強塗糊渠本不如此識之者是箇沒妻子底龐居士不識者乃無人情底王蠻子榮侍郎畫像讚謂渠似維摩耶無佛病法病謂渠似龐公耶有男婚女嫁超然透過兩翁畢竟二邊俱化夫是之謂榮二卿袖手儼然神情間暇者也方經略敷文畫像讚岌岌堂堂七尺軀無心合道暗相符針鋒頭上天關透世出世間真丈夫無相居士畫像讚渾鋼打就脊梁骨磊落塵中過量人一去萬牛挽不住箇是渠儂身內身太虗居士畫像讚神清徹骨氣和如春葷不入口酒不濡唇正倫何也太虗無雲或謂妙喜讚者為誰曰無相居士克家之子忠孝兩全底鄧伯壽之真趙觀察畫像讚世味淡薄靈龜五臧併臧其一鋒頴莫當造次必於是訓子以義方嚲袖携笻步武頎然岌岌堂堂是謂士林堅好木乃釋門外護之金湯蘇知縣甫明畫像讚椹口秀目心清寡欲為政不苛姦蠧潛衄我説是言如響應谷觀者譁曰明甫實録孟監場異夫畫像讚手搦燕璧目送雲鴻傲睨萬物之表了無餘事於胸中夫是之謂孟異夫乃姚江之陶朱公徐御藥畫像讚號審觀居士頎然七尺大丈夫胸次廓然如太虗審觀名實兩相稱堪與人間作畫圖歐陽總幹畫像讚採石江邊李謫仙醉中拏月上青天今觀此士亦如然飲酒一斗詩百篇張都監畫像讚忠義果敢世無敵鐵騎橫衝百萬兵慣從五鳳樓前過手握金鞭賀太平李光祖畫像讚胸次坦夷仁義以字養之體涉風素清癯髯以資之為政禦吏髮櫛而苗薅之於道不苟篤信而躬行之夫是之謂李光祖佩絃千百而愈緩靠裏昏而無斷者也陳逍遙畫像讚傲睨萬物袖手儼然氣清神定矯若飛仙夫是之謂陳逍遙慈儉躬行而不敢為天下先者也無相居士畫杜少陵像求讚可憐能作詩嬴得肚中飢終朝醉兀兀騎驢何所之方敷文畫東坡先生像求讚二道大德備為萬古東坡如是如是闕里橫梁頽波暗嗚叱吒驚天動地柯信甫畫像讚胸次磊磊落落舉止如山如嶽一生只自修行不管他人好惡覺苑沖長老求王承宣畫像讚華陀歸去幾千年此道世久失其傳獨有是公達本源可與此老相差肩我初識公于大梁時已氣槩摩秋霜能生必死於膏肓後無來者前無雙覺苑求豫讚是公我今描畫太虗空公術能攘造化功酷熱之際鏖東風我本寡聞無似者荷公道義不相捨倒腹空腸盡傾瀉但看此讚即知也盧宣教畫像讚嚲袖携笻步武歸浩然之氣吐虹霓不知除却神仙輩更有何人得似伊歲寒居士張知府畫像讚氷柱兮摩空藤蘿兮倚樹貌古神色清氣平心膽素貧無地卓錐富有照乘珠有問歲寒何似生看取妙喜末後句孫郎中求羅先生畫像讚烏髯𩮎髿碧眸閃爍據奪命方鍊不死藥在塵出塵都無染著夫是之謂羅赤腳傅畫像讚風度凝遠清深窅然如春在花如意在絃有乃祖遺風餘烈為儒林挺特之賢雖倣佛丹青其一二蓋胸中蘊妙而難傳夫是之謂傅使君行將拊摩山之雲煙而中興拭眼歸宗之禪者也時將赴南康任妙心居士畫像讚野服幅巾非假非真元來這漢是我般人渠常喜我常嗔兩箇八兩定一斤王校正畫像讚莫論節義世希有事業文章總罷休只將一味無求法坐斷三衢人舌頭王子正畫像讚了達生死如夢事夢中誰復論親疏臨行一著超今古堪作塵寰真丈夫王大授畫像讚堂堂七尺身言行兩相應士林堅好木特秀一枝春是謂汪溪先生字曰大授志願未伸若驊騮在凡馬之廄死而不亡謂之壽天將相斯文之不墜也張尚期於有後唐主管携先文畫像求讚了相非相見實相一念廓然無背向八十四年如是修龜毛拂子兔角杖傅畫像讚孰其後兮孰其先目送飛鴻氣悠然傲睨萬物凌雲煙飲酒一斗詩百篇藺廷彥畫像讚携笻步武自徐徐灑落風姿氣凜如活計貧無置錐地胸中富有五車書俞巡撿畫像讚紫綬金章矍爍翁詩書萬卷在胸中便宜從事非無意每到詞窮即詐聾歐陽提幹畫像讚揮毫落紙鬼神泣獨步橫拖七尺笻文彩風流乃餘事試問負壺丫角童羅國信畫像讚蕭然一枕臥長空寶座蓮臺信已通七十三年好消息一時分付與春風錢計議畫像讚一生咬菜根清淨無倫比臨行一著奇猶如脫弊屣要識錢子虗恁麼而已矣鮑知府畫像讚野服幅巾矯若飛仙神情間暇訪道參禪夫是之謂鮑使君不被八風五欲之所纏者也張太尉畫像讚顧虎頭傳難陀石上坐頤神孤松倒挂倚巖風搖清聲又作僧像求讚丹青在己巳行年七十四雖然無度牒形儀十分似董太尉畫像讚不為富貴所折困孤松之下坐磐陀撥轉上頭關捩子堪充震旦老維摩湛淨居士畫像讚坐石握拂不可輕忽湛淨如如胸中無物妙觀居士畫像讚嚲袖拖笻步武清風燕巖谷之暇日無留事於胸中李運使畫像讚等間示現宰官身便作儒林出格人野服幅巾歸舊隱遊戲寰中物外春張侍郎畫像讚透出天關抹過地戶斗轉星移日輪當午廓仁義道德之門塞邪非鬼趣之路夫是之謂無垢老人慣向百尺竿頭進步者也趙知宗畫像讚攙行奪市得人憎攪撓叢林罵葛藤妙喜退身三步去諸方誰敢弄精魂唐大夫畫像讚一味讀經參禪胸中無物留連要識此公落處便是妙喜齊年徐侍郎畫像讚謂是俗人世事全疏謂是苾芻有髮有鬚莫怪胸中淈𣸩都盧面觜糢糊不修戒定慧而求出世間法不斷淫怒癡而不與之俱好箇人中癡鈍漢亦婆羅門外道之徒歟幻住道人畫像讚有月上女之英氣而不逞機鋒似靈照之逸羣而不誇作略驀過邪師默照之深坑高出二人頂𩕳上一著生鐵鑄就脊梁渾鋼打成雙腳此是女流中真大丈夫不為八風五欲之所轉者也楊太保畫像讚人言此是楊太保我道梅陽護法神天資忠義不諂曲一片精誠正直心孫參政畫像讚窮理盡性入佛知見七十八年空中閃電無垢居士張侍郎畫讚攪遍三千大千界都盧自買又自賣而今本利一時空却去貧兒處索債渠活計我偏知半聾半啞半呆半癡猶自赤手討便宜常將掃畫娥眉雙槐居士鄭參議畫像讚心觀瀑布溜外境無所緣內亦無所受坐石倚枯松知音試窮究世間出世間一網都打就韓尚書畫像讚野服幅巾携笻嚲袖目送征鴻心無所受實百代良吏之師乃十世昌黎之後只向是處行不為文所囿慷慨特達大丈夫處事若日輪之當晝者也錢侍郎畫像讚不貪生死諸欲快樂不隨想倒見倒心倒夫是之謂世間出世間大丈夫坐禪牀握拂子儼然在一切人眼睛中不須向別處尋討作是説者為誰雙徑明月堂妙喜宗杲妙圓居士張知府畫像讚胸中元有五車書納江湖於度內兮綽有餘汪洋如萬頃之陂兮未讓江夏牛醫兒夫是之謂妙圓居士學妙喜相期於此道兮世所希者也讚佛祖釋迦出山相三十二相八十種好道樹鹿苑自起自倒文殊問疾二只知贊不二失却一隻眼自號七佛師去而不復返俗漢自病無端插觜引惹詞訟至今未已入定觀音二瞑目危坐示那伽相觀音妙智一椎兩當住寂靜地應剎塵量法如是故無礙無障身不動搖心入正受一點靈光如日當晝維摩居士二佛病與法病一掃兩俱盡傳語老維摩惜取窮性命空諸所有深入不二舉一針鋒驚天動地觀音達磨相對像達磨觀音觀音達磨我即是你你即是我一身兩名鼻孔耳朵彼此無言相對淡坐坐不坐咄當甚熱大九祖伏馱密多尊者五十餘年打坐不知等箇甚麼直饒主伴交羅未免當頭蹉過初祖達磨大師二枯松之下坐磐陀著意忘懷兩不蹉來者直須高著眼擡眸子過新羅竺乾不容住懡㦬涉流沙打落當門齒猶言五葉花二祖換却頭顱骨無端又易名斷臂立深雪笑殺那邊人六祖大鑑禪師咄這老漢且去碓米傳甚瓦鉢衣盂謅得四海鼎沸今日見你形模元來也只如此馬祖大寂禪師即心即佛非心非佛透過兩重關畢竟是何物龐居士二多年曆日繫腰間知與誰人作對談笊籬放下高叉手應機何必口喃喃無生本無説説著即話墮骨肉團圝頭大蟲看水磨布袋和尚四稽首龍華補處佛不肯安然住兜率却來𢌅市要尋人人間指作白拈賊赤揎兩腿箕踞坐賣弄麻鞋逞奇特口中時復自喃喃唱言我是真彌勒藞苴不存儀軌亦無將將濟濟十方法界虗空都在破布袋裏驀然閙市解開撒向街頭巷尾南無彌勒世尊家風如是而已桔撩棒挑破席倒街臥路求乞誰知覩史陀天元無這箇消息藞藞苴苴全無定度十字街頭遭人點污臨濟和尚三色如淋了灰堆喝似旱天震雷雖有粗粗慥慥却無隈隈𣯧𣯧咄咄咄是甚麼不得這箇道理定依一枚賊魁面上少和氣肚裏多骨董可惜三頓棒打這老漆桶一句中具三玄一玄中具三要腦後見腮村僧向上更有一竅普化和尚瞪開三角殺人眼緊握拳頭聳兩肩佛祖位中留不得却來𢌅市掣風顛雪峯真覺禪師這箇漆桶也解𪹼裂據欵結案只得一橛如何是那一橛嶺上寒松天邊白月滅滅法眼李王相對像人王法王有真偽天眼法眼無纖翳一幅丹青兩得之究竟同歸第一義言法華藞苴全無儀軌常走街頭巷尾口頭雖誦蓮經肚裏長思喫底人言凡聖莫窺妙喜獨識得你咄哉破落村僧脫却一雙木履五祖和尚賤賣簷板漢貼稱麻三斤多少參玄士錯認定盤星説我元非我言真不是真直饒傳得似猶未別其神圓悟禪師四突出兩箇當門齒舌本瀾翻似紡車擊石火中呈醜拙閃電光裏復周遮捺却膝聳却身做模打樣弄假像真如今縱有這伎倆擬將分付與何人謗於佛毀於法十分藞苴一味孟八面目可憎好與椎殺正法眼滅瞎驢邊咄將此身心奉塵剎更不藏覆開口見膽學人不會却成簷板咄哉藞苴川僧偏要欺瞞魯子盡用無限神通未免歸鄉卒死將謂有多少奇特伎倆兀來只如此覺範洪禪師透得雲庵一字關愛論曹山三種墮筆端之上海濤翻橫説竪説渾無過嬴得籍甚之名幾取殺身之禍文章未讓孔丘談禪豈肯達磨諸人還見麼休尋無髮官人且看僧中措大死心和尚禪又不會一味粗慥是讚是罵道道道道佛燈珣和尚空却閻浮世難求此箇僧若將言語會直是得人憎罵佛又罵祖誰知元不曾請君抖擻精神看莫認渠儂作佛燈南華昺和尚平生頂門眼照徹無纖翳太平與南華逢場便作戲七月十六朝雷聲震天地我觀法王法法王法如是牧庵忠和尚內心寂靜外緣屏絶悟處諦當用處親切一棒一條痕一摑一掌血忠道者家風須是妙喜説火裏烏龜飛上天六月紛紛飄瑞雪和山方和尚伽梨勃窣坐胡床虎視叢林百怪藏莫道死心今已死死心有子不曾亡普照英和尚擊塗毒鼓説無味禪以覺為印印覺羣情得佛祖之要妙徹萬法之根源於刀山劒樹上奪衲僧性命向鑊湯爐炭裏以此事流傳是謂大法之梁棟苦海之舟船若也向這裏提撕猶如掘地而覓青天普照欽和尚擊碎溈山塗毒鼓任運騰騰過此生莫怪世人渾不識常從佛祖那邊行佛日才和尚佛日讚佛日非真即是真有問似不似挂起便鋪陳普明和尚證長靈般若之體得圓悟大機之用燕坐霅川三處道場靜聖儼臨半千之衆念此道之凌遲若一絲引千鈞之重祖肩荷擔如山不動夫是之謂普明老人如箭射的而百發百中者也泉州勝和尚大坐當軒膝橫楖𣗖手不驅蚊脅不至席有時象王回旋或作獅子返擲燈籠與露柱交參占波共新羅鬪額知師者謂六月黃河徹底氷不知師者謂九秋霜月連天白饒伊亂度量總是韶州客妙空佛海訥和尚妙相怡然耽耽虎視雲門一字之玄風闡三句為人之巴鼻掃浮非歸實是把定佛祖要關不許衲僧吐氣夫是之謂妙空佛海老人建法幢於大道顛危之際者也含清照和尚興化棒未折克賓話已行雲居雪峯老日午打三更天王光和尚真獅子兒耽耽虎視神定氣平身心不二悟祖師禪腳踏實地橫按摸椰如是如是開善護和尚鐵面巖稜全無柔和氣鋭性剛不受折銼貶剝瞿曇撿點達磨好與雲門一狀領過南華明和尚凜凜威風有規有矩起東山雲施曹溪雨一句當陽截斷露布我今讚之超今越古南安巖琅和尚雲庵的孫湛堂嗣子虎視耽耽無彼無此一擊塗毒聞之即死南安巖畔日高眠便是渠儂逸格禪玄沙昭和尚栗棘蓬金剛圈唯此老是真傳若也信不及且聽渠説禪作麼生是渠説底禪猛火著油煎慈雲祖和尚參徹先師逸格禪知音不遇且如然而今老住慈雲寺嬴得清聲播大千國清遠和尚這川藞苴無真無假一條白棒佛來也打更有一般長處解向鉢盂裏走馬溈山慧和尚虎頭燕頷將軍相橫按霜笻物表高一口等間吞佛祖有何魔外敢譊譊能仁敏和尚形儀軟似綿脊梁硬似鐵冬不畏寒夏不怕熱夫是之謂敏和尚無窮福利而不自矜者也正堂辨和尚傳佛眼道説逸格禪不立窠臼不滯語言作自得之鼻祖為叢林之美傳夫是之謂正堂老人乃得魚而忘筌者也山東惠雲金師翁有威有德人皆敬畏劈面上聞且不要諱山東惠雲周師翁磊磊落落如山如嶽據坐五峯清風索索箇是惠雲周大師稽首祥麟一隻角鹽官慧生庵主昔日生法師講得石頭點今日生庵主亦把家風展畫得渾相似堂堂不可掩求我讚稱揚碧眸光閃閃喻彌陀箇是喻彌陀傳來不較多觀瞻如具眼靜處薩婆訶萃長老寫宏智禪師與師相對像求讚兩眼對兩眼各簷一片板合得無鏠罅會俉非遲晚傍觀有人敢定當許伊曾喫大蟲膽保寧秀和尚坐鳳凰臺傳天童道自在快活不屬作造失鄉關者方便指歸迷寶所者引之令到一條渾鋼脊梁鐵棒打之不倒觀者高著眼且不得草草夢庵信和尚二住世七十八年提持向上一著鏌鎁𣍿裏橫按八倒七顛俱著伽梨勃窣坐孤風迥絶攀頂𩕳上一著不許衲僧參大慧先師以無量三昧辨才秉佛慧炬洞燭人心承學之徒隨説抄録散落諸方末後最庵道印法兄裒次編正總為一集名曰廣録前後顛末了然無遺昔釋迦老子住世七十九年説法三百餘會臨涅槃時於金棺中現露雙趺以示迦葉迦葉告諸比丘佛已涅槃凡金剛舍利非我等事我等當結集法藏無令斷絶道印法兄之用心與迦葉等然當時迦葉一言之後阿難依教奏行佛之奧義遍滿沙界祖慶親炙先師之日最久敢不奉承道印法兄之用心鏤版刊行以廣其傳庶幾見者聞者同悟真如佛之慧命永永不絶古語云自未得度先度人者菩薩發心學者當有以亮祖慶附麗阿難之本意紹熙元年四月結制日祖慶謹跋
